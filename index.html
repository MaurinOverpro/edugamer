<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduGamer OS - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Reset e base */
        body { 
            background-color: #0a0e17; 
            color: #e2e8f0; 
            font-family: 'Verdana', sans-serif; 
            height: 100dvh; /* Usa dynamic viewport height per mobile */
            width: 100vw;
            overflow: hidden; /* Evita scroll della pagina intera */
            margin: 0;
            padding: 0;
        }

        /* Card Stile Cyberpunk */
        .cyber-card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid #334155; 
            transition: all 0.2s ease; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 16px; 
            position: relative;
            overflow: hidden;
        }
        
        /* Effetti hover e active per touch */
        .cyber-card:active { transform: scale(0.96); }
        @media (hover: hover) {
            .cyber-card:hover { 
                border-color: #4ade80; 
                transform: translateY(-5px); 
                box-shadow: 0 0 20px rgba(74, 222, 128, 0.2); 
            }
        }

        /* Animazione Barra XP */
        .xp-bar-fill { 
            background: linear-gradient(90deg, #16a34a, #4ade80, #16a34a); 
            background-size: 200% 100%; 
            animation: shimmer 2s infinite linear; 
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        /* Scrollbar personalizzata */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        /* Gestione schermi con altezza ridotta */
        @media (max-height: 700px) {
            .cyber-card {
                min-height: 120px !important;
            }
            .cyber-card .text-4xl,
            .cyber-card .md\:text-6xl {
                font-size: 2.5rem !important;
            }
            .cyber-card h2 {
                font-size: 1rem !important;
                margin-bottom: 0.5rem !important;
            }
        }

        @media (max-height: 600px) {
            .cyber-card {
                min-height: 100px !important;
            }
            header {
                margin-bottom: 0.5rem !important;
            }
        }
    </style>
</head>
<body>
    <div id="root" style="height: 100%;"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const DB = {
            getKey: () => localStorage.getItem('gemini_api_key') || '',
            setKey: (key) => localStorage.setItem('gemini_api_key', key),
            getXP: () => parseInt(localStorage.getItem('edu_xp') || '0'),
            getLevel: () => Math.floor(Math.sqrt(parseInt(localStorage.getItem('edu_xp') || '0') / 10)) + 1
        };

        const TUTOR_SUBJECTS = [
            { key: 'matematica', name: 'Matematica', emoji: '📐' },
            { key: 'italiano',   name: 'Italiano',   emoji: '📖' },
            { key: 'storia',     name: 'Storia',     emoji: '📜' },
            { key: 'scienze',    name: 'Scienze',    emoji: '🔬' },
            { key: 'geografia',  name: 'Geografia',  emoji: '🌍' },
            { key: 'arte',       name: 'Arte',       emoji: '🎨' },
        ];

        const App = () => {
            const [xp, setXp] = useState(DB.getXP());
            const [showSettings, setShowSettings] = useState(false);
            const [key, setKey] = useState(DB.getKey());
            const [showTutorMenu, setShowTutorMenu] = useState(false);

            // Aggiorna XP in tempo reale
            useEffect(() => {
                const interval = setInterval(() => setXp(DB.getXP()), 1000); 
                return () => clearInterval(interval);
            }, []);

            const saveKey = () => { 
                DB.setKey(key); 
                setShowSettings(false); 
                alert("Chiave Salvata! Ora puoi usare i moduli."); 
            };

            const modules = [
                { name: "LAVAGNA AI",  file: "lavagna.html",   icon: "🧠", color: "text-green-400",  border: "border-green-500"  },
                { name: "MATEMATICA",  file: "matematica.html", icon: "📐", color: "text-yellow-400", border: "border-yellow-500" },
                { name: "ITALIANO",    file: "italiano.html",   icon: "📖", color: "text-blue-400",   border: "border-blue-500"   },
                { name: "RICERCHE",    file: "ricerche.html",   icon: "📚", color: "text-indigo-400", border: "border-indigo-500" },
            ];

            if (showSettings) {
                return (
                    <div className="h-full flex items-center justify-center p-4">
                        <div className="bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-600 max-w-md w-full text-center shadow-2xl">
                            <h2 className="text-xl md:text-2xl font-bold mb-4 text-purple-400">⚙️ IMPOSTAZIONI</h2>
                            <p className="text-slate-400 text-sm mb-4">Inserisci qui la API Key di Google AI Studio.</p>
                            <input 
                                type="password" 
                                value={key} 
                                onChange={e => setKey(e.target.value)} 
                                placeholder="Incolla API Key..." 
                                className="w-full bg-slate-900 p-3 md:p-4 rounded-xl mb-4 text-white outline-none border border-slate-600 focus:border-purple-500" 
                            />
                            <div className="flex gap-2 flex-col sm:flex-row">
                                <button onClick={() => setShowSettings(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold p-3 rounded-xl transition-all">ANNULLA</button>
                                <button onClick={saveKey} className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold p-3 rounded-xl transition-all shadow-lg">SALVA</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col p-3 md:p-6 max-w-4xl mx-auto w-full">
                    
                    {/* HEADER: Titolo e Pulsanti */}
                    <header className="flex justify-between items-center mb-3 md:mb-6 shrink-0 gap-2">
                        <div className="text-lg md:text-3xl font-black text-white flex items-center gap-2 md:gap-3 truncate">
                            <div className="w-3 h-3 md:w-4 md:h-4 bg-green-500 rounded-full animate-pulse shrink-0"></div>
                            <span className="truncate">EDUGAMER OS</span>
                        </div>
                        
                        <div className="flex gap-2 shrink-0">
                            {/* Pulsante Isola */}
                            <a href="isola.html" className="flex items-center gap-2 px-3 py-2 rounded-xl border border-yellow-600 bg-yellow-900/40 hover:bg-yellow-800/50 text-yellow-300 transition-all font-bold text-xs md:text-sm no-underline active:scale-95 shadow-sm">
                                <span className="text-base md:text-lg">🏴‍☠️</span>
                                <span className="hidden sm:inline">ISOLA</span>
                            </a>
                            {/* Pulsante Profilo Integrato */}
                            <a href="profilo.html" className="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-600 bg-slate-800/50 hover:bg-slate-700 text-slate-200 transition-all font-bold text-xs md:text-sm no-underline active:scale-95 shadow-sm">
                                <span className="text-base md:text-lg">👤</span>
                                <span className="hidden sm:inline">PROFILO</span>
                            </a>
                            {/* Pulsante Settings */}
                            <button onClick={() => setShowSettings(true)} className="px-3 py-2 rounded-xl border border-slate-600 bg-slate-800/50 hover:bg-slate-700 text-white active:scale-95 transition-all shadow-sm">
                                ⚙️
                            </button>
                        </div>
                    </header>

                    {/* XP BAR CARD */}
                    <div className="bg-slate-800 p-4 md:p-6 rounded-2xl border border-slate-600 mb-3 md:mb-6 shadow-xl relative overflow-hidden shrink-0">
                        <div className="flex justify-between items-end mb-2 relative z-10">
                            <span className="text-lg md:text-3xl font-bold text-yellow-400">LIVELLO {DB.getLevel()}</span>
                            <span className="text-xs md:text-base text-slate-300 font-mono">{xp} XP</span>
                        </div>
                        <div className="h-3 md:h-4 bg-slate-900 rounded-full overflow-hidden border border-slate-700 relative z-10">
                            <div className="h-full xp-bar-fill transition-all duration-1000" style={{ width: `${Math.min(100, xp % 100)}%` }}></div>
                        </div>
                        {/* Decorazione sfondo */}
                        <div className="absolute -right-6 -bottom-6 text-slate-700/20 text-9xl select-none pointer-events-none">🎮</div>
                    </div>

                    {/* GRIGLIA 3 MODULI */}
                    <div className="flex-1 min-h-0 overflow-y-auto" style={{paddingBottom:'80px'}}>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4 h-full content-start">
                            {modules.map(m => (
                                <a key={m.name} href={m.file} className={`cyber-card ${m.border} bg-slate-800/50 hover:bg-slate-800 p-4 md:p-6 group`}>
                                    <div className="text-4xl md:text-6xl mb-2 md:mb-4 group-hover:scale-110 transition-transform duration-200">{m.icon}</div>
                                    <h2 className={`text-lg md:text-2xl font-bold ${m.color} mb-2 text-center`}>{m.name}</h2>
                                    <span className="text-[10px] md:text-xs text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">APRI MODULO</span>
                                </a>
                            ))}
                        </div>
                    </div>

                    {/* TUTOR BAR — fissa in basso */}
                    <div style={{
                        position:'fixed', bottom:0, left:0, right:0, zIndex:50,
                        background:'rgba(10,14,23,0.97)',
                        borderTop:'1px solid rgba(167,139,250,0.35)',
                        backdropFilter:'blur(12px)',
                        padding:'8px 12px'
                    }}>
                        {/* Selettore materie — appare sopra il pulsante */}
                        {showTutorMenu && (
                            <div style={{
                                display:'grid', gridTemplateColumns:'repeat(3,1fr)',
                                gap:'6px', marginBottom:'8px'
                            }}>
                                {TUTOR_SUBJECTS.map(s => (
                                    <a key={s.key} href={`tutor.html?materia=${s.key}`}
                                        style={{
                                            display:'flex', alignItems:'center', justifyContent:'center', gap:'6px',
                                            padding:'8px 6px', borderRadius:'12px',
                                            background:'rgba(88,28,135,0.5)',
                                            border:'1px solid rgba(167,139,250,0.4)',
                                            color:'#e9d5ff', fontWeight:'bold', fontSize:'13px',
                                            textDecoration:'none', textAlign:'center'
                                        }}>
                                        <span>{s.emoji}</span><span>{s.name}</span>
                                    </a>
                                ))}
                                <a href="tutor.html"
                                    style={{
                                        display:'flex', alignItems:'center', justifyContent:'center', gap:'6px',
                                        padding:'8px 6px', borderRadius:'12px',
                                        background:'rgba(30,41,59,0.8)',
                                        border:'1px solid rgba(100,116,139,0.4)',
                                        color:'#94a3b8', fontWeight:'bold', fontSize:'13px',
                                        textDecoration:'none', textAlign:'center'
                                    }}>
                                    <span>💬</span><span>Domanda libera</span>
                                </a>
                            </div>
                        )}
                        {/* Pulsante principale */}
                        <button
                            onClick={() => setShowTutorMenu(!showTutorMenu)}
                            style={{
                                width:'100%', padding:'12px',
                                borderRadius:'14px',
                                background:'linear-gradient(135deg,#581c87,#7c3aed)',
                                border:'1px solid rgba(167,139,250,0.5)',
                                color:'white', fontWeight:'bold', fontSize:'16px',
                                cursor:'pointer', display:'flex', alignItems:'center',
                                justifyContent:'center', gap:'10px',
                                boxShadow:'0 0 20px rgba(124,58,237,0.4)'
                            }}>
                            <span>🎓</span>
                            <span>CHIEDI AL TUTOR</span>
                            <span style={{fontSize:'12px', opacity:0.7}}>{showTutorMenu ? '▼' : '▲'}</span>
                        </button>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="game-system.js"></script>
</body>
</html>
