<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio di Scrittura - EduGamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">

    <style>
        * { letter-spacing: 0.03em; word-spacing: 0.05em; box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #0a0e17; color: white; font-family: 'OpenDyslexic', Verdana, sans-serif; }
        
        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }

        .btn-magico { background: linear-gradient(135deg, #3b82f6, #8b5cf6); transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .btn-magico:active { transform: scale(0.95); }
        .btn-magico:disabled { background: #475569; box-shadow: none; transform: none; cursor: not-allowed; opacity: 0.7; }

        .post-it { background: linear-gradient(135deg, #fef08a, #fde047); color: #1e293b; border-radius: 12px; padding: 12px; box-shadow: 2px 4px 10px rgba(0,0,0,0.3); border-left: 6px solid #eab308; cursor: grab; transition: transform 0.2s; position: relative; }
        .post-it:active { cursor: grabbing; transform: scale(0.98); }

        .editor-area { font-family: 'OpenDyslexic', Verdana, sans-serif; font-size: 1.2rem; line-height: 1.8; width: 100%; border-radius: 12px; padding: 16px; background: #1e293b; border: 2px solid #3b82f6; color: white; resize: none; min-height: 150px; }
        .editor-area:focus { outline: none; border-color: #facc15; box-shadow: 0 0 15px rgba(250,204,21,0.3); }

        .error-highlight { background-color: rgba(239, 68, 68, 0.3); border-bottom: 3px wavy #ef4444; font-weight: bold; border-radius: 4px; padding: 0 4px; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }

        .ai-bubble { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 2px solid #a855f7; padding: 15px 25px; border-radius: 30px; color: #e9d5ff; font-weight: bold; display: flex; align-items: center; gap: 15px; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; max-width: 600px; animation: slide-up 0.3s ease-out; }
        @keyframes slide-up { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .mic-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; cursor: pointer; }
        .mic-btn.recording { background: #ef4444; animation: pulse-mic 1s infinite; box-shadow: 0 0 20px #ef4444; }
        .mic-btn.idle { background: #3b82f6; }
        @keyframes pulse-mic { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const MODEL = "gemini-3.0-flash"; 

        const DB = {
            getKey: () => localStorage.getItem('gemini_api_key'),
            addXP: (amount) => {
                const next = parseInt(localStorage.getItem('edu_xp') || '0') + amount;
                localStorage.setItem('edu_xp', next.toString());
                window.dispatchEvent(new Event('xpChanged'));
            }
        };

        // Rimosso il backtick dalla regex che causava il crash del parser Babel!
        const cleanTextForSpeech = (text) => {
            if (!text) return '';
            return String(text).replace(/[*#_~"]/g, '').replace(/\n+/g, '. ').trim();
        };

        window.speechSequenceID = 0;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        const AI = {
            checkText: async (text) => {
                const key = DB.getKey();
                if(!key) throw new Error("Manca API Key!");
                const prompt = `Analizza questo testo per un ragazzo con dislessia: "${text}"
Trova TUTTI gli errori di ortografia, punteggiatura e grammatica.
Rispondi SOLO con un array JSON:
[{"original":"parola sbagliata", "correction":"parola giusta", "explanation":"Breve motivo semplice"}]
Se perfetto, restituisci: []`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
            },

            improveFluency: async (text) => {
                const key = DB.getKey();
                if(!key) throw new Error("Manca API Key!");
                const prompt = `Sei un maestro di scrittura creativa.
Un tuo studente con dislessia ha scritto questo testo:
"${text}"
Riscrivi il testo rendendolo più SCORREVOLE. Aggiungi "connettivi logici" (es: improvvisamente, poi, allora, perciò, mentre) per far scorrere la storia.
NON aggiungere idee nuove, unisci solo meglio quelle esistenti. Usa parole semplici.
Rispondi SOLO con JSON:
{
  "fluency_text": "il nuovo testo scorrevole",
  "ai_comment": "Breve messaggio di 15 parole (es: 'Ho aggiunto parole come -poi- per far scorrere le frasi!')"
}`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
            }
        };

        const App = () => {
            const [stage, setStage] = useState('title');
            const [title, setTitle] = useState('');
            const [ideas, setIdeas] = useState([]);
            const [currentIdeaInput, setCurrentIdeaInput] = useState('');
            const [isRecording, setIsRecording] = useState(false);
            
            const [drafts, setDrafts] = useState({});
            const [currentDraftIndex, setCurrentDraftIndex] = useState(0);
            
            const [finalText, setFinalText] = useState('');
            const [errors, setErrors] = useState([]);
            const [currentErrorIndex, setCurrentErrorIndex] = useState(0);
            const [isChecking, setIsChecking] = useState(false);

            const [fluentText, setFluentText] = useState('');
            const [styleComment, setStyleComment] = useState('');
            const [aiMessage, setAiMessage] = useState(null);

            const recognitionRef = useRef(null);

            useEffect(() => {
                if(SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.lang = 'it-IT';
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;
                    
                    recognitionRef.current.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setCurrentIdeaInput(prev => prev + (prev ? ' ' : '') + transcript);
                    };
                    recognitionRef.current.onend = () => setIsRecording(false);
                    recognitionRef.current.onerror = () => setIsRecording(false);
                }
            }, []);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                window.speechSequenceID++;
                const currentSeq = window.speechSequenceID;
                
                setAiMessage(text);
                
                let cleanText = cleanTextForSpeech(text);
                if (!cleanText.match(/[.!?]$/)) cleanText += '.';
                
                const chunks = cleanText.match(/[^.!?]+[.!?]+/g) || [cleanText];
                let chunkIndex = 0;

                const speakNextChunk = () => {
                    if (currentSeq !== window.speechSequenceID) return;
                    if (chunkIndex >= chunks.length) {
                        setTimeout(() => setAiMessage(null), 1000);
                        return;
                    }

                    const chunkText = chunks[chunkIndex].trim();
                    if (!chunkText) {
                        chunkIndex++;
                        speakNextChunk();
                        return;
                    }

                    const u = new SpeechSynthesisUtterance(chunkText);
                    u.lang = 'it-IT'; 
                    u.rate = 0.9;
                    
                    const voices = window.speechSynthesis.getVoices();
                    const itVoices = voices.filter(v => v.lang.startsWith('it'));
                    const bestVoice = itVoices.find(v => v.name.includes('Natural') || v.name.includes('Google')) || itVoices[0];
                    if(bestVoice) u.voice = bestVoice;
                    
                    u.onend = () => { chunkIndex++; speakNextChunk(); };
                    u.onerror = () => { if (currentSeq === window.speechSequenceID) { chunkIndex++; speakNextChunk(); } };
                    
                    window.speechSynthesis.speak(u);
                };
                speakNextChunk();
            };

            const toggleDictation = () => {
                if(!recognitionRef.current) return alert("Dettatura vocale non supportata.");
                if(isRecording) { recognitionRef.current.stop(); setIsRecording(false); }
                else { recognitionRef.current.start(); setIsRecording(true); }
            };

            const startBrainstorming = () => {
                if(!title.trim()) return;
                DB.addXP(10);
                speak(`Ottimo titolo! Ora inseriamo le idee principali usando la tastiera o il microfono integrato.`);
                setStage('brainstorm');
            };

            const addIdea = () => {
                if(!currentIdeaInput.trim()) return;
                setIdeas([...ideas, { id: Date.now().toString(), text: currentIdeaInput.trim() }]);
                setCurrentIdeaInput('');
                DB.addXP(5);
            };

            const removeIdea = (id) => setIdeas(ideas.filter(i => i.id !== id));

            const handleDragStart = (e, index) => e.dataTransfer.setData('index', index.toString());
            const handleDrop = (e, index) => {
                const draggedIdx = parseInt(e.dataTransfer.getData('index'));
                const newIdeas = [...ideas];
                const [draggedItem] = newIdeas.splice(draggedIdx, 1);
                newIdeas.splice(index, 0, draggedItem);
                setIdeas(newIdeas);
            };

            const startDrafting = () => {
                if(ideas.length === 0) return speak("Aggiungi almeno un'idea!");
                speak(`Perfetto. Ora espandi ogni post-it in una frase.`);
                setStage('draft');
            };

            const handleDraftChange = (val) => {
                const currentId = ideas[currentDraftIndex]?.id;
                if(currentId) setDrafts({ ...drafts, [currentId]: val });
            };

            // Funzione di Stile Spostata in alto per sicurezza Javascript
            const startStyling = async (textBase) => {
                setStage('style');
                setIsChecking(true);
                try {
                    const res = await AI.improveFluency(textBase);
                    setFluentText(res.fluency_text);
                    setStyleComment(res.ai_comment);
                    speak(res.ai_comment);
                } catch(e) { setStage('final'); }
                setIsChecking(false);
            };

            const analyzeText = async (textToCheck) => {
                setStage('review');
                setIsChecking(true);
                try {
                    const errs = await AI.checkText(textToCheck);
                    if(!errs || errs.length === 0) {
                        setErrors([]);
                        DB.addXP(50);
                        startStyling(textToCheck); 
                    } else {
                        setErrors(errs);
                        setCurrentErrorIndex(0);
                        speak(`Ho trovato ${errs.length} dettagli da sistemare. Risolviamoli uno alla volta!`);
                    }
                } catch(e) { alert("Errore di rete, riprova."); setStage('draft'); }
                setIsChecking(false);
            };

            const nextDraft = () => {
                DB.addXP(15);
                if(currentDraftIndex < ideas.length - 1) {
                    setCurrentDraftIndex(prev => prev + 1);
                    speak("Ottimo! Passiamo alla prossima idea.");
                } else {
                    const combined = ideas.map(i => drafts[i.id] || "").filter(t => t.trim() !== "").join("\n\n");
                    setFinalText(combined);
                    speak("Stesura completata! Ora indago per vedere se si è nascosto qualche errore.");
                    analyzeText(combined);
                }
            };

            const applyCorrection = () => {
                const currentErr = errors[currentErrorIndex];
                const newText = finalText.replace(currentErr.original, currentErr.correction);
                setFinalText(newText);
                DB.addXP(10);
                
                speak(`Corretto! ${currentErr.original} diventa ${currentErr.correction}.`);
                
                if(currentErrorIndex < errors.length - 1) {
                    setCurrentErrorIndex(prev => prev + 1);
                } else {
                    speak("Hai superato tutte le sfide ortografiche! Ora facciamo una magia...");
                    startStyling(newText);
                }
            };

            const acceptStyle = () => {
                setFinalText(fluentText);
                DB.addXP(30);
                speak("Ottima scelta! Il testo scorre meravigliosamente.");
                setStage('final');
            };

            const rejectStyle = () => {
                speak("Nessun problema, la tua versione originale è già fantastica!");
                setStage('final');
            };

            const renderReviewText = () => {
                if(errors.length === 0 || currentErrorIndex >= errors.length) return finalText;
                const err = errors[currentErrorIndex];
                const parts = finalText.split(err.original);
                if(parts.length === 1) return finalText; 

                return (
                    <div className="whitespace-pre-wrap text-xl leading-relaxed text-gray-300">
                        {parts[0]}
                        <span className="error-highlight text-white">{err.original}</span>
                        {parts.slice(1).join(err.original)}
                    </div>
                );
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Sfondo Bianco (nessun rect nero disegnato)
                
                // Titolo in Blu scuro
                doc.setTextColor(37, 99, 235); 
                doc.setFontSize(24);
                doc.text(title, 105, 30, { align: 'center' });
                
                // Testo principale in Grigio molto scuro (Slate 800 - quasi nero)
                doc.setTextColor(30, 41, 59); 
                doc.setFontSize(14);
                const splitText = doc.splitTextToSize(finalText, 170);
                doc.text(splitText, 20, 50);

                // Linea separatrice elegante in fondo
                doc.setDrawColor(203, 213, 225); // Grigio chiaro
                doc.setLineWidth(1); 
                doc.line(20, 250, 190, 250);
                
                // Statistiche per la maestra (Testo grigio medio)
                doc.setTextColor(100, 116, 139); 
                doc.setFontSize(12);
                doc.text(`Idee organizzate: ${ideas.length} | Sfide superate: ${errors.length}`, 105, 260, { align: 'center' });
                doc.text(`Creato con EduGamer - Metodo Inclusivo`, 105, 270, { align: 'center' });

                // Salvataggio
                doc.save(`${title.replace(/\s+/g, '_')}_EduGamer.pdf`);
                DB.addXP(20);
                speak("Il tuo capolavoro è pronto da stampare e consegnare!");
            };

            // RENDER UI //
            if(stage === 'title') return (
                <div className="h-full flex flex-col items-center justify-center p-6 gap-6 bg-slate-900 overflow-y-auto">
                    <h1 className="text-4xl font-black text-blue-400 text-center drop-shadow-lg">TUTOR DI SCRITTURA ✍️</h1>
                    <div className="bg-slate-800 p-8 rounded-3xl flex flex-col items-center gap-6 w-full max-w-xl shadow-2xl border-2 border-slate-700">
                        <label className="text-xl font-bold text-yellow-300">Di cosa vuoi scrivere oggi?</label>
                        <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Es: La mia gita in montagna..." className="editor-area text-center py-4 text-xl" autoFocus />
                        <button onClick={startBrainstorming} disabled={!title.trim()} className="btn-magico w-full py-4 rounded-2xl font-bold text-white text-xl">INIZIAMO! 🚀</button>
                    </div>
                    <a href="index.html" className="text-slate-400 bg-slate-800 px-6 py-3 rounded-xl font-bold mt-4 border border-slate-700">🏠 MENU</a>
                </div>
            );

            if(stage === 'brainstorm') return (
                <div className="h-full flex flex-col p-4 gap-4 bg-slate-900">
                    <div className="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border-b-4 border-yellow-400 shadow-lg shrink-0">
                        <div className="text-yellow-400 font-bold text-lg hidden sm:block">💡 FASE 1: LE IDEE</div>
                        <div className="text-white font-bold truncate max-w-[200px] sm:max-w-xs text-center flex-1 mx-2">{title}</div>
                        <button onClick={startDrafting} className="bg-green-500 hover:bg-green-400 px-4 py-2 rounded-xl font-bold text-white active:scale-95 transition-all">CONTINUA ➡️</button>
                    </div>

                    <div className="flex-1 overflow-y-auto min-h-0 w-full pb-4">
                        <div className="flex flex-col lg:flex-row gap-6">
                            <div className="w-full lg:w-1/3 bg-slate-800 p-6 rounded-3xl border-2 border-slate-700 flex flex-col gap-4">
                                <h3 className="text-xl font-bold text-cyan-300">Aggiungi un'idea</h3>
                                <p className="text-sm text-slate-400">Scrivi qui o usa il microfono della tastiera!</p>
                                <textarea value={currentIdeaInput} onChange={e => setCurrentIdeaInput(e.target.value)} placeholder="Es: Zaino pesante..." className="editor-area flex-1 min-h-[100px] text-lg" />
                                <button onClick={addIdea} disabled={!currentIdeaInput.trim()} className="bg-blue-600 font-bold text-white py-3 rounded-xl active:scale-95 disabled:opacity-50">
                                    + CREA POST-IT
                                </button>
                            </div>

                            <div className="flex-1 bg-slate-900 rounded-3xl p-6 border-2 border-slate-700">
                                <h3 className="text-slate-500 font-bold text-center mb-6">Trascina i post-it per ordinarli</h3>
                                <div className="flex flex-col gap-3">
                                    {ideas.map((idea, index) => (
                                        <div key={idea.id} draggable onDragStart={e => handleDragStart(e, index)} onDragOver={e => e.preventDefault()} onDrop={e => handleDrop(e, index)} className="post-it flex justify-between items-center text-xl">
                                            <div className="flex items-center gap-3"><span className="text-slate-500 font-black opacity-50">#{index + 1}</span><span className="font-bold text-slate-900">{idea.text}</span></div>
                                            <button onClick={() => removeIdea(idea.id)} className="text-red-500 hover:bg-red-200 rounded-full font-bold text-xl w-8 h-8 flex items-center justify-center">✕</button>
                                        </div>
                                    ))}
                                    {ideas.length === 0 && <div className="text-center text-slate-600 font-bold mt-10 text-xl border-2 border-dashed border-slate-700 p-10 rounded-2xl">Aggiungi i tuoi post-it qui!</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if(stage === 'draft') return (
                <div className="h-full flex flex-col p-4 gap-4 bg-slate-900">
                    <div className="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border-b-4 border-blue-400 shadow-lg shrink-0">
                        <div className="text-blue-400 font-bold text-lg hidden sm:block">📝 FASE 2: LA STESURA ({currentDraftIndex + 1}/{ideas.length})</div>
                        <div className="text-white font-bold">{title}</div>
                        <div className="w-[100px] hidden sm:block"></div>
                    </div>

                    <div className="flex-1 overflow-y-auto min-h-0 w-full pb-4">
                        <div className="flex flex-col items-center justify-start max-w-4xl mx-auto w-full gap-6 mt-4">
                            <div className="post-it w-full text-center text-2xl py-6 shadow-2xl relative">
                                <span className="text-slate-500 text-lg absolute left-4 top-4">Idea {currentDraftIndex + 1}</span>
                                <span className="block mt-4">" {ideas[currentDraftIndex]?.text} "</span>
                            </div>
                            <div className="w-full text-center text-slate-400 bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                                Espandi l'idea usando la tastiera. Gli errori li sistemiamo dopo!
                            </div>
                            <textarea autoFocus value={drafts[ideas[currentDraftIndex]?.id] || ""} onChange={e => handleDraftChange(e.target.value)} placeholder="Scrivi la frase qui..." className="editor-area w-full text-xl sm:text-2xl p-6 shadow-inner min-h-[250px]" />
                            <button onClick={nextDraft} disabled={!(drafts[ideas[currentDraftIndex]?.id] || "").trim()} className="btn-magico w-full py-5 rounded-2xl font-bold text-white text-xl sm:text-2xl mt-4 shrink-0">
                                {currentDraftIndex < ideas.length - 1 ? 'PROSSIMA IDEA ➡️' : 'FINITO! CONTROLLIAMO 🔍'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            if(stage === 'review') return (
                <div className="h-full flex flex-col p-4 gap-4 bg-slate-900">
                    <div className="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border-b-4 border-purple-400 shadow-lg shrink-0">
                        <div className="text-purple-400 font-bold text-lg">🔍 FASE 3: L'INVESTIGATORE</div>
                        {!isChecking && errors.length > 0 && <div className="bg-purple-900 border border-purple-500 px-4 py-1 rounded-full text-purple-200 font-bold text-sm">Sfida {currentErrorIndex + 1} di {errors.length}</div>}
                    </div>

                    <div className="flex-1 overflow-y-auto min-h-0 w-full pb-4">
                        <div className="flex flex-col lg:flex-row gap-6 max-w-6xl mx-auto w-full h-full">
                            <div className="flex-1 bg-slate-900 p-6 sm:p-8 rounded-3xl border-2 border-slate-700 shadow-inner h-max lg:h-full overflow-y-auto">
                                {isChecking ? (
                                    <div className="flex flex-col items-center justify-center gap-6 py-10"><div className="text-7xl animate-bounce">🤖</div><div className="text-2xl text-purple-400 font-bold animate-pulse text-center">Analizzo il testo...</div></div>
                                ) : renderReviewText()}
                            </div>

                            {!isChecking && errors.length > 0 && (
                                <div className="w-full lg:w-96 bg-slate-800 p-6 rounded-3xl border-2 border-purple-500 flex flex-col justify-center items-center text-center gap-6 shadow-2xl shrink-0 h-max">
                                    <div className="text-6xl drop-shadow-md">🕵️‍♂️</div>
                                    <div className="w-full">
                                        <div className="text-slate-400 mb-2 text-sm font-bold uppercase">Indizio sull'errore:</div>
                                        <div className="text-2xl sm:text-3xl text-red-400 font-bold line-through decoration-wavy break-words bg-red-900/20 py-2 rounded-xl">{errors[currentErrorIndex].original}</div>
                                    </div>
                                    <div className="text-3xl text-slate-600 animate-pulse">⬇️</div>
                                    <div className="w-full">
                                        <div className="text-slate-400 mb-2 text-sm font-bold uppercase">Forma corretta:</div>
                                        <div className="text-3xl sm:text-4xl text-green-400 font-bold break-words bg-green-900/20 py-3 rounded-xl shadow-lg">{errors[currentErrorIndex].correction}</div>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-xl text-yellow-300 w-full font-bold border border-slate-700 shadow-inner mt-2">
                                        💡 {errors[currentErrorIndex].explanation}
                                    </div>
                                    <button onClick={applyCorrection} className="btn-magico w-full py-4 rounded-xl font-bold text-white text-xl mt-2 shadow-lg">
                                        APPLICA CORREZIONE ✨
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            if(stage === 'style') return (
                <div className="h-full flex flex-col p-4 gap-4 bg-slate-900">
                    <div className="bg-slate-800 p-4 rounded-2xl flex items-center border-b-4 border-pink-400 shadow-lg shrink-0 justify-center">
                        <div className="text-pink-400 font-bold text-xl text-center">✨ FASE 4: LA MAGIA DELLO SCRITTORE</div>
                    </div>

                    <div className="flex-1 overflow-y-auto min-h-0 w-full pb-4">
                        <div className="flex flex-col items-center justify-start max-w-5xl mx-auto w-full gap-6">
                            {isChecking ? (
                                <div className="flex flex-col items-center gap-6 py-10"><div className="text-7xl animate-spin">🪄</div><div className="text-2xl text-pink-400 font-bold animate-pulse text-center">L'AI sta unendo le frasi in un racconto fluido...</div></div>
                            ) : (
                                <>
                                    <p className="text-slate-300 text-center text-lg max-w-2xl bg-slate-800 p-4 rounded-xl border border-slate-700">
                                        Ho aggiunto qualche "parola ponte" (come: allora, poi, mentre) per far scorrere meglio le tue idee. Ascoltale entrambe e scegli quale ti piace di più!
                                    </p>
                                    
                                    <div className="flex flex-col md:flex-row w-full gap-6">
                                        <div className="flex-1 flex flex-col bg-slate-800 border-2 border-slate-600 rounded-2xl overflow-hidden opacity-90 h-max">
                                            <div className="bg-slate-700 p-3 flex justify-between items-center text-slate-300 border-b border-slate-600">
                                                <span className="font-bold text-lg">La tua versione</span>
                                                <button onClick={() => speak(finalText)} className="bg-slate-600 hover:bg-slate-500 w-12 h-12 rounded-full flex items-center justify-center text-2xl shadow-md border border-slate-500">🔊</button>
                                            </div>
                                            <div className="p-6 text-lg leading-relaxed text-slate-300 flex-1">
                                                {finalText.split('\n').map((par, i) => <p key={i} className="mb-4">{par}</p>)}
                                            </div>
                                            <button onClick={rejectStyle} className="bg-slate-700 p-5 font-bold text-white hover:bg-slate-600 text-lg border-t border-slate-600">
                                                ✋ TIENI LA MIA
                                            </button>
                                        </div>

                                        <div className="flex-1 flex flex-col bg-slate-900 border-2 border-pink-500 rounded-2xl overflow-hidden shadow-[0_0_30px_rgba(236,72,153,0.3)] h-max">
                                            <div className="bg-pink-900/50 p-3 flex justify-between items-center text-pink-300 border-b border-pink-700/50">
                                                <span className="font-bold text-lg">Versione Magica ✨</span>
                                                <button onClick={() => speak(fluentText)} className="bg-pink-700 hover:bg-pink-600 w-12 h-12 rounded-full flex items-center justify-center text-2xl shadow-md text-white border border-pink-500">🔊</button>
                                            </div>
                                            <div className="p-6 text-lg leading-relaxed text-white flex-1">
                                                {(fluentText||'').split('\n').map((par, i) => <p key={i} className="mb-4">{par}</p>)}
                                            </div>
                                            <button onClick={acceptStyle} className="bg-pink-600 p-5 font-bold text-white hover:bg-pink-500 text-xl border-t border-pink-700">
                                                ✨ ACCETTA LA MAGIA
                                            </button>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                    {aiMessage && <div className="ai-bubble"><span className="text-3xl">🤖</span><span>{aiMessage}</span></div>}
                </div>
            );

            if(stage === 'final') return (
                <div className="h-full flex flex-col p-4 gap-4 bg-slate-900">
                    <div className="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border-b-4 border-green-400 shadow-lg shrink-0">
                        <div className="text-green-400 font-bold text-lg">🎉 IL TUO CAPOLAVORO</div>
                        <button onClick={() => window.location.reload()} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-white font-bold active:scale-95 transition-all">Scrivi un altro</button>
                    </div>

                    <div className="flex-1 overflow-y-auto min-h-0 w-full pb-4">
                        <div className="flex flex-col items-center justify-start max-w-4xl mx-auto w-full gap-6 mt-4">
                            <h2 className="text-3xl sm:text-4xl font-black text-blue-400 text-center mb-2 drop-shadow-md">{title}</h2>
                            <div className="bg-slate-800 p-6 sm:p-8 rounded-3xl border-2 border-slate-700 w-full text-xl sm:text-2xl leading-loose text-gray-200 shadow-inner h-max">
                                {finalText.split('\n').map((par, i) => <p key={i} className="mb-6">{par}</p>)}
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 w-full mt-auto mb-4">
                                <button onClick={() => speak(finalText)} className="flex-1 bg-purple-600 py-4 sm:py-5 rounded-2xl font-bold text-white text-lg sm:text-xl shadow-lg active:scale-95 flex items-center justify-center gap-2 border-2 border-purple-400 transition-transform">
                                    <span className="text-2xl">🔊</span> ASCOLTA
                                </button>
                                <button onClick={exportPDF} className="flex-1 bg-red-600 py-4 sm:py-5 rounded-2xl font-bold text-white text-lg sm:text-xl shadow-lg active:scale-95 flex items-center justify-center gap-2 border-2 border-red-400 transition-transform">
                                    <span className="text-2xl">📄</span> SCARICA PDF
                                </button>
                            </div>
                        </div>
                    </div>
                    {aiMessage && <div className="ai-bubble"><span className="text-3xl">🤖</span><span>{aiMessage}</span></div>}
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="game-system.js"></script>
</body>
</html>
