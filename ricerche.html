<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generatore di Ricerche - EduGamer</title>
    <!-- FONT OPENDYSLEXIC (accessibilità DSA) -->
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { background: #0a0e17; color: white; font-family: 'OpenDyslexic', Verdana, sans-serif; letter-spacing: 0.02em; line-height: 1.6; overflow-x: hidden; }
        input, textarea, button { font-family: 'OpenDyslexic', Verdana, sans-serif; }
        input:focus, textarea:focus { outline: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b4a6b; border-radius: 4px; }

        @keyframes slide-in  { from { transform:translateY(18px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes spin      { to { transform:rotate(360deg); } }
        @keyframes float     { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
        .slide-in  { animation: slide-in 0.38s ease-out; }
        .spin      { animation: spin 0.85s linear infinite; }
        .float-anim{ animation: float 2.2s ease-in-out infinite; }

        /* Documento preview — stile carta */
        .doc-preview {
            background: #fff; color: #1a1a2e;
            border-radius: 16px; padding: 28px 26px;
            max-width: 680px; margin: 0 auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            font-family: 'OpenDyslexic', Verdana, sans-serif;
        }
        .doc-title {
            font-family: Georgia, 'Times New Roman', serif;
            color: #1a1a4e; font-size: 1.5em; font-weight: bold;
            line-height: 1.3; margin-bottom: 4px;
        }
        .doc-level-badge {
            display: inline-block; font-size: 10px; color: #6366f1;
            font-weight: bold; letter-spacing: 0.06em; text-transform: uppercase;
            margin-bottom: 12px;
        }
        .doc-divider { border: none; border-top: 1.5px solid #dde2f0; margin: 14px 0; }
        .doc-section-heading {
            font-family: Georgia, serif;
            color: #2a2a6e; font-size: 1.05em; font-weight: bold;
            margin: 18px 0 6px; padding-left: 10px;
            border-left: 4px solid #6366f1;
        }
        .doc-text { color: #2a2a3a; font-size: 0.86em; line-height: 1.85; margin-bottom: 10px; }
        .keyword-box {
            background: #f0f0ff; border: 1px solid #c8c8ee;
            border-radius: 10px; padding: 14px 16px; margin-top: 18px;
        }
        .keyword-box-title {
            font-family: Georgia, serif; color: #3a3a8e;
            font-size: 0.95em; font-weight: bold; margin-bottom: 8px;
        }
        .keyword-row { font-size: 0.82em; color: #2a2a4a; margin-bottom: 5px; line-height: 1.6; }
        .keyword-term { font-weight: bold; color: #3a3a8e; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useCallback } = React;

    /* ── CONSTANTS ─────────────────────────────────────────────── */
    const MODEL = "gemini-3-flash-preview";

    const LEVELS = [
        {
            id: 'media',
            label: 'Scuola Media',
            sub: '11–13 anni',
            prompt: 'livello scuola media (11-13 anni). Usa linguaggio semplice e chiaro (B1), frasi brevi, spiega sempre i termini tecnici.',
            color: '#4ade80',
        },
        {
            id: 'superiori',
            label: 'Scuola Superiore',
            sub: '14–18 anni',
            prompt: 'livello scuola superiore (14-18 anni). Usa linguaggio corretto e articolato (B2), puoi usare terminologia disciplinare appropriata.',
            color: '#38bdf8',
        },
        {
            id: 'adulti',
            label: 'Università / Adulti',
            sub: '19+ anni',
            prompt: 'livello universitario/adulto. Usa linguaggio formale e accademico preciso, con piena terminologia disciplinare.',
            color: '#c084fc',
        },
    ];

    /* ── SVG DECORAZIONI TEMATICHE ─────────────────────────────── */
    const SVG_ICONS = {
        storia: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="21" rx="36" ry="9" fill="#d4a855" stroke="#8b6410" strokeWidth="1.5"/>
                <rect x="14" y="21" width="72" height="58" rx="4" fill="#f5e8c0" stroke="#8b6410" strokeWidth="1.5"/>
                <ellipse cx="50" cy="79" rx="36" ry="9" fill="#c49040" stroke="#8b6410" strokeWidth="1.5"/>
                <line x1="26" y1="36" x2="74" y2="36" stroke="#8b6410" strokeWidth="1.5" opacity="0.5"/>
                <line x1="26" y1="46" x2="74" y2="46" stroke="#8b6410" strokeWidth="1"   opacity="0.4"/>
                <line x1="26" y1="56" x2="62" y2="56" stroke="#8b6410" strokeWidth="1"   opacity="0.4"/>
                <line x1="26" y1="66" x2="70" y2="66" stroke="#8b6410" strokeWidth="1"   opacity="0.4"/>
            </svg>
        ),
        scienze: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <circle cx="50" cy="50" r="9" fill="#38bdf8" opacity="0.9"/>
                <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#38bdf8" strokeWidth="2" opacity="0.7"/>
                <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#38bdf8" strokeWidth="2" opacity="0.7" transform="rotate(60 50 50)"/>
                <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#38bdf8" strokeWidth="2" opacity="0.7" transform="rotate(120 50 50)"/>
                <circle cx="86" cy="50" r="5" fill="#fbbf24"/>
                <circle cx="32" cy="26" r="5" fill="#fbbf24"/>
                <circle cx="32" cy="74" r="5" fill="#fbbf24"/>
            </svg>
        ),
        geografia: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <circle cx="50" cy="50" r="36" fill="#1a4a8a" stroke="#38bdf8" strokeWidth="1.5"/>
                <ellipse cx="50" cy="50" rx="20" ry="36" fill="none" stroke="#38bdf8" strokeWidth="1" opacity="0.5"/>
                <line x1="14" y1="50" x2="86" y2="50" stroke="#38bdf8" strokeWidth="1" opacity="0.5"/>
                <line x1="22" y1="32" x2="78" y2="32" stroke="#38bdf8" strokeWidth="0.8" opacity="0.4"/>
                <line x1="22" y1="68" x2="78" y2="68" stroke="#38bdf8" strokeWidth="0.8" opacity="0.4"/>
                <path d="M36 36 Q46 30 57 38 Q66 43 61 53 Q55 60 45 56 Q34 52 36 44 Z" fill="#4ade80" opacity="0.75"/>
            </svg>
        ),
        letteratura: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <path d="M50 22 Q24 20 14 30 L14 78 Q24 70 50 74 Z" fill="#f5e8c0" stroke="#8b6410" strokeWidth="1.5"/>
                <path d="M50 22 Q76 20 86 30 L86 78 Q76 70 50 74 Z" fill="#ede0b0" stroke="#8b6410" strokeWidth="1.5"/>
                <line x1="50" y1="22" x2="50" y2="74" stroke="#8b6410" strokeWidth="2"/>
                <line x1="22" y1="38" x2="46" y2="37" stroke="#8b6410" strokeWidth="1" opacity="0.5"/>
                <line x1="22" y1="47" x2="46" y2="46" stroke="#8b6410" strokeWidth="1" opacity="0.4"/>
                <line x1="22" y1="56" x2="46" y2="55" stroke="#8b6410" strokeWidth="1" opacity="0.4"/>
                <line x1="54" y1="38" x2="78" y2="37" stroke="#8b6410" strokeWidth="1" opacity="0.5"/>
                <line x1="54" y1="47" x2="78" y2="46" stroke="#8b6410" strokeWidth="1" opacity="0.4"/>
                <line x1="54" y1="56" x2="78" y2="55" stroke="#8b6410" strokeWidth="1" opacity="0.4"/>
            </svg>
        ),
        matematica: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <line x1="50" y1="14" x2="28" y2="82" stroke="#c084fc" strokeWidth="2.5" strokeLinecap="round"/>
                <line x1="50" y1="14" x2="72" y2="82" stroke="#c084fc" strokeWidth="2.5" strokeLinecap="round"/>
                <circle cx="50" cy="14" r="6" fill="#fbbf24"/>
                <path d="M22 78 Q50 94 78 78" fill="none" stroke="#c084fc" strokeWidth="1.8" opacity="0.6"/>
                <line x1="18" y1="42" x2="82" y2="58" stroke="#fbbf24" strokeWidth="1.5" opacity="0.65" strokeDasharray="5,4"/>
            </svg>
        ),
        natura: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <line x1="50" y1="86" x2="50" y2="40" stroke="#4ade80" strokeWidth="2.5" strokeLinecap="round"/>
                <path d="M50 40 Q76 24 66 56 Q58 70 50 60 Q42 70 34 56 Q24 24 50 40 Z" fill="#4ade80" opacity="0.85"/>
                <line x1="50" y1="40" x2="50" y2="60" stroke="#1a6030" strokeWidth="1" opacity="0.7"/>
                <line x1="50" y1="46" x2="62" y2="41" stroke="#1a6030" strokeWidth="0.8" opacity="0.5"/>
                <line x1="50" y1="52" x2="63" y2="50" stroke="#1a6030" strokeWidth="0.8" opacity="0.5"/>
                <line x1="50" y1="46" x2="38" y2="41" stroke="#1a6030" strokeWidth="0.8" opacity="0.5"/>
                <path d="M50 66 Q34 56 29 62" stroke="#4ade80" strokeWidth="1.5" fill="none"/>
                <path d="M50 66 Q66 56 71 62" stroke="#4ade80" strokeWidth="1.5" fill="none"/>
            </svg>
        ),
        generale: (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <polygon points="50,8 59,36 89,36 65,54 74,82 50,64 26,82 35,54 11,36 41,36"
                    fill="#fbbf24" opacity="0.88"/>
            </svg>
        ),
    };

    /* ── DB ────────────────────────────────────────────────────── */
    const DB = {
        getKey: () => localStorage.getItem('gemini_api_key'),
    };

    /* ── AI ────────────────────────────────────────────────────── */
    const callGemini = async (prompt) => {
        const key = DB.getKey();
        if (!key) throw new Error("Chiave API mancante — torna alla Home per inserirla");
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
        );
        if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `Errore API ${res.status}`); }
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    };

    const parseJSON = (text) => {
        const c = text.replace(/```json\s*/gi,'').replace(/```\s*/gi,'').trim();
        return JSON.parse(c);
    };

    const AI = {
        suggestTitles: async (topic, levelId) => {
            const lvl = LEVELS.find(l => l.id === levelId);
            const prompt =
`Sei un assistente scolastico esperto. Uno studente vuole fare una ricerca su: "${topic}"
Livello: ${lvl.label} (${lvl.sub}).

Un buon titolo di ricerca deve essere: chiaro, specifico (non troppo generico né troppo stretto), in italiano corretto, adatto alla presentazione in classe.

Proponi 3 titoli diversi, dal più ampio al più specifico. Per ognuno, scrivi UNA frase brevissima che spiega perché è una buona scelta per una ricerca scolastica.

Rispondi SOLO con JSON valido, senza testo aggiuntivo:
{"suggestions":[{"title":"...","reason":"..."},{"title":"...","reason":"..."},{"title":"...","reason":"..."}]}`;
            const raw = await callGemini(prompt);
            return parseJSON(raw).suggestions;
        },

        generateResearch: async (title, levelId) => {
            const lvl = LEVELS.find(l => l.id === levelId);
            const prompt =
`Sei un assistente per ricerche scolastiche. Crea una ricerca completa e ben strutturata su:
"${title}"

Livello richiesto: ${lvl.prompt}

REGOLE OBBLIGATORIE:
- Linguaggio formale, adatto alla presentazione in classe
- NESSUNA analogia informale, NESSUN esempio personale o sportivo
- Frasi complete, grammaticalmente corrette
- Struttura accademica chiara con sezioni tematiche significative
- Intro: 70-100 parole. Ogni sezione: 90-140 parole. Conclusione: 60-90 parole.
- Vocabolario: 5-6 termini chiave con definizione (15-25 parole ciascuna)
- Identifica la categoria tra: storia, scienze, geografia, letteratura, matematica, natura, generale

Rispondi SOLO con JSON valido, senza testo aggiuntivo:
{
  "title": "${title}",
  "category": "storia|scienze|geografia|letteratura|matematica|natura|generale",
  "intro": "...",
  "sections": [
    {"heading": "...", "content": "..."},
    {"heading": "...", "content": "..."},
    {"heading": "...", "content": "..."}
  ],
  "keywords": [
    {"term": "...", "definition": "..."},
    {"term": "...", "definition": "..."},
    {"term": "...", "definition": "..."},
    {"term": "...", "definition": "..."},
    {"term": "...", "definition": "..."}
  ],
  "conclusion": "..."
}`;
            const raw = await callGemini(prompt);
            return parseJSON(raw);
        },
    };

    /* ── EXPORT PDF ────────────────────────────────────────────── */
    const exportPDF = (doc) => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        const W = 210, H = 297, M = 22, CW = W - M * 2;
        let y = M;

        const checkBreak = (needed = 8) => {
            if (y + needed > H - M) { pdf.addPage(); y = M; }
        };

        const block = (heading, content, hColor = [42, 42, 110]) => {
            checkBreak(18);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(13);
            pdf.setTextColor(...hColor);
            pdf.text(heading, M, y); y += 7;
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(11);
            pdf.setTextColor(30, 30, 50);
            pdf.splitTextToSize(content, CW).forEach(ln => {
                checkBreak(6); pdf.text(ln, M, y); y += 6;
            });
            y += 5;
        };

        // Title
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(20);
        pdf.setTextColor(26, 26, 78);
        pdf.splitTextToSize(doc.title, CW).forEach(ln => {
            checkBreak(10); pdf.text(ln, W / 2, y, { align: 'center' }); y += 9;
        });
        y += 2;
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(9);
        pdf.setTextColor(100, 100, 150);
        pdf.text(LEVELS.find(l => l.id === doc.level)?.label || '', W / 2, y, { align: 'center' });
        y += 6;
        pdf.setDrawColor(150, 120, 40);
        pdf.setLineWidth(0.6);
        pdf.line(M, y, W - M, y);
        y += 8;

        // Sections
        block('Introduzione', doc.intro);
        doc.sections.forEach(s => block(s.heading, s.content));
        pdf.setDrawColor(180, 180, 220);
        pdf.setLineWidth(0.4);
        pdf.line(M, y - 2, W - M, y - 2);
        block('Conclusione', doc.conclusion);

        // Keywords
        if (doc.keywords?.length) {
            checkBreak(16 + doc.keywords.length * 13);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(12);
            pdf.setTextColor(42, 42, 110);
            pdf.text('Vocabolario chiave', M, y); y += 7;
            doc.keywords.forEach(kw => {
                checkBreak(12);
                const termLabel = `• ${kw.term}: `;
                const termW = pdf.getTextWidth(termLabel);
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(10); pdf.setTextColor(50, 50, 130);
                pdf.text(termLabel, M + 2, y);
                pdf.setFont('helvetica', 'normal'); pdf.setTextColor(40, 40, 70);
                const defLines = pdf.splitTextToSize(kw.definition, CW - termW - 4);
                pdf.text(defLines[0] || '', M + 2 + termW, y);
                y += 5;
                defLines.slice(1).forEach(dl => { checkBreak(5); pdf.text(dl, M + 12, y); y += 5; });
                y += 1;
            });
        }

        const safe = doc.title.replace(/[^a-zA-Z0-9À-ùÀ-Ú ]/g, '').replace(/\s+/g, '_');
        pdf.save(`Ricerca_${safe}.pdf`);
    };

    /* ── EXPORT PPTX ───────────────────────────────────────────── */
    const exportPPTX = async (doc) => {
        const pptx = new PptxGenJS();
        pptx.layout = 'LAYOUT_WIDE'; // 13.33 × 7.5 pollici (16:9)
        const lvlLabel = LEVELS.find(l => l.id === doc.level)?.label || '';
        const BG_DARK = '0a1628', BG_SLIDE = '0f172a';
        const GOLD = 'fbbf24', BLUE = '38bdf8', GREEN = '4ade80', LIGHT = 'e2e8f0', MUTED = '64748b';

        // ── Slide 1: Titolo
        let s = pptx.addSlide();
        s.background = { color: BG_DARK };
        s.addText('', { x: 0, y: 0, w: 13.33, h: 0.08, fill: { color: GOLD } });
        s.addText('', { x: 0, y: 7.42, w: 13.33, h: 0.08, fill: { color: GOLD } });
        s.addText(doc.title, {
            x: 0.7, y: 1.6, w: 11.93, h: 2.8,
            fontSize: 34, bold: true, color: GOLD, align: 'center', fontFace: 'Georgia', valign: 'middle',
        });
        s.addText('Ricerca scolastica', {
            x: 0.7, y: 4.6, w: 11.93, h: 0.6,
            fontSize: 15, color: LIGHT, align: 'center', italic: true,
        });
        s.addText(lvlLabel, {
            x: 0.7, y: 5.3, w: 11.93, h: 0.5,
            fontSize: 13, color: MUTED, align: 'center',
        });

        // ── Helper: slide contenuto
        const addSlide = (heading, content, accentColor) => {
            let sl = pptx.addSlide();
            sl.background = { color: BG_SLIDE };
            sl.addText('', { x: 0, y: 0, w: 13.33, h: 0.07, fill: { color: accentColor } });
            sl.addText(heading, {
                x: 0.4, y: 0.22, w: 12.5, h: 0.75,
                fontSize: 22, bold: true, color: accentColor, fontFace: 'Georgia',
            });
            sl.addText(content, {
                x: 0.4, y: 1.15, w: 12.5, h: 6.0,
                fontSize: 14, color: LIGHT, valign: 'top', charSpacing: 0.2,
            });
        };

        addSlide('Introduzione', doc.intro, GOLD);
        doc.sections.forEach(sec => addSlide(sec.heading, sec.content, BLUE));
        addSlide('Conclusione', doc.conclusion, GOLD);

        // ── Slide vocabolario
        if (doc.keywords?.length) {
            let sl = pptx.addSlide();
            sl.background = { color: BG_SLIDE };
            sl.addText('', { x: 0, y: 0, w: 13.33, h: 0.07, fill: { color: GREEN } });
            sl.addText('Vocabolario chiave', {
                x: 0.4, y: 0.22, w: 12.5, h: 0.75,
                fontSize: 22, bold: true, color: GREEN, fontFace: 'Georgia',
            });
            const rows = doc.keywords.map(kw => ([
                { text: kw.term, options: { bold: true, color: GREEN, fontSize: 13 } },
                { text: kw.definition, options: { color: LIGHT, fontSize: 13 } },
            ]));
            sl.addTable(rows, {
                x: 0.5, y: 1.2, w: 12.3,
                colW: [2.8, 9.5],
                fontSize: 13, border: { type: 'none' },
                rowH: 0.54,
            });
        }

        const safe = doc.title.replace(/[^a-zA-Z0-9À-ùÀ-Ú ]/g, '').replace(/\s+/g, '_');
        await pptx.writeFile({ fileName: `Ricerca_${safe}.pptx` });
    };

    /* ── LEVEL SELECTOR ────────────────────────────────────────── */
    const LevelSelector = ({ value, onChange }) => (
        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            {LEVELS.map(l => (
                <button key={l.id} onClick={() => onChange(l.id)}
                    style={{
                        padding: '9px 14px', borderRadius: '11px', cursor: 'pointer',
                        border: value === l.id ? `2px solid ${l.color}` : '1px solid rgba(100,116,139,0.3)',
                        background: value === l.id ? `${l.color}22` : 'rgba(15,23,42,0.7)',
                        color: value === l.id ? l.color : '#64748b',
                        fontWeight: value === l.id ? 'bold' : 'normal',
                        fontSize: '13px', transition: 'all 0.18s',
                    }}>
                    {l.label}<br/>
                    <span style={{ fontSize: '11px', opacity: 0.75 }}>{l.sub}</span>
                </button>
            ))}
        </div>
    );

    /* ── DOCUMENT PREVIEW ──────────────────────────────────────── */
    const ResearchPreview = ({ doc }) => {
        const icon = SVG_ICONS[doc.category] || SVG_ICONS.generale;
        const lvlLabel = LEVELS.find(l => l.id === doc.level)?.label || '';
        return (
            <div className="doc-preview slide-in">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '10px' }}>
                    <div style={{ flex: 1, paddingRight: '14px' }}>
                        <div className="doc-title">{doc.title}</div>
                        <span className="doc-level-badge">{lvlLabel}</span>
                    </div>
                    <div style={{ width: '70px', height: '70px', flexShrink: 0 }}>{icon}</div>
                </div>
                <hr className="doc-divider"/>

                <div className="doc-section-heading">Introduzione</div>
                <p className="doc-text">{doc.intro}</p>

                {doc.sections.map((sec, i) => (
                    <div key={i}>
                        <div className="doc-section-heading">{sec.heading}</div>
                        <p className="doc-text">{sec.content}</p>
                    </div>
                ))}

                <hr className="doc-divider"/>
                <div className="doc-section-heading">Conclusione</div>
                <p className="doc-text">{doc.conclusion}</p>

                {doc.keywords?.length > 0 && (
                    <div className="keyword-box">
                        <div className="keyword-box-title">📖 Vocabolario chiave</div>
                        {doc.keywords.map((kw, i) => (
                            <div key={i} className="keyword-row">
                                <span className="keyword-term">{kw.term}:</span> {kw.definition}
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    /* ── APP ───────────────────────────────────────────────────── */
    const App = () => {
        const [phase,       setPhase]       = useState('input');     // 'input' | 'suggesting' | 'generating' | 'result'
        const [topic,       setTopic]       = useState('');
        const [level,       setLevel]       = useState('media');
        const [suggestions, setSuggestions] = useState(null);
        const [chosenTitle, setChosenTitle] = useState('');
        const [loadingMsg,  setLoadingMsg]  = useState('');
        const [error,       setError]       = useState('');
        const [doc,         setDoc]         = useState(null);
        const [exporting,   setExporting]   = useState(null);        // null | 'pdf' | 'pptx'

        const suggestTitles = async () => {
            if (!topic.trim()) { setError("Scrivi prima l'argomento!"); return; }
            setError(''); setSuggestions(null); setPhase('suggesting');
            try {
                const s = await AI.suggestTitles(topic.trim(), level);
                setSuggestions(s);
            } catch (e) { setError('Errore: ' + e.message); }
            setPhase('input');
        };

        const generate = async () => {
            const title = chosenTitle.trim() || topic.trim();
            if (!title) { setError('Scegli o scrivi un titolo per la ricerca!'); return; }
            setError(''); setPhase('generating');
            setLoadingMsg('Analisi dell\'argomento...');
            try {
                await new Promise(r => setTimeout(r, 500));
                setLoadingMsg('Strutturazione della ricerca...');
                const result = await AI.generateResearch(title, level);
                result.level = level;
                setDoc(result);
                window.EduGamer?.addXP(50, 'ricerche', 'research');
                setPhase('result');
            } catch (e) {
                setError('Errore nella generazione: ' + e.message);
                setPhase('input');
            }
        };

        const handleExport = async (type) => {
            if (!doc || exporting) return;
            setExporting(type);
            try {
                if (type === 'pdf')  exportPDF(doc);
                if (type === 'pptx') await exportPPTX(doc);
            } catch (e) {
                alert('Errore esportazione: ' + e.message);
            } finally {
                setExporting(null);
            }
        };

        const reset = () => {
            setPhase('input'); setDoc(null); setSuggestions(null);
            setChosenTitle(''); setTopic(''); setError('');
        };

        /* ── Loading ── */
        if (phase === 'generating') return (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '22px' }}>
                <div className="float-anim" style={{ fontSize: '60px' }}>📚</div>
                <div style={{ width: '28px', height: '28px', border: '3px solid rgba(99,102,241,0.3)', borderTopColor: '#6366f1', borderRadius: '50%' }} className="spin"/>
                <div style={{ color: '#94a3b8', fontSize: '14px' }}>{loadingMsg}</div>
            </div>
        );

        /* ── Result ── */
        if (phase === 'result' && doc) return (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                {/* Top bar */}
                <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: '8px', padding: '10px 14px',
                    background: 'rgba(10,14,23,0.96)', borderBottom: '1px solid rgba(99,102,241,0.15)',
                    backdropFilter: 'blur(12px)', flexWrap: 'wrap' }}>
                    <button onClick={reset} aria-label="Nuova ricerca"
                        style={{ padding: '8px 14px', borderRadius: '10px', cursor: 'pointer',
                            background: 'rgba(30,41,59,0.9)', border: '1px solid rgba(71,85,105,0.5)',
                            color: '#94a3b8', fontSize: '13px' }}>
                        ← Nuova ricerca
                    </button>
                    <div style={{ flex: 1 }}/>
                    <button onClick={() => handleExport('pdf')} disabled={!!exporting} aria-label="Esporta PDF"
                        style={{ padding: '8px 16px', borderRadius: '10px', cursor: exporting ? 'default' : 'pointer',
                            background: exporting === 'pdf' ? 'rgba(220,38,38,0.5)' : 'linear-gradient(135deg,#dc2626,#ef4444)',
                            border: 'none', color: 'white', fontWeight: 'bold', fontSize: '13px', opacity: exporting && exporting !== 'pdf' ? 0.5 : 1 }}>
                        {exporting === 'pdf' ? '⏳ PDF...' : '📄 PDF'}
                    </button>
                    <button onClick={() => handleExport('pptx')} disabled={!!exporting} aria-label="Esporta PowerPoint"
                        style={{ padding: '8px 16px', borderRadius: '10px', cursor: exporting ? 'default' : 'pointer',
                            background: exporting === 'pptx' ? 'rgba(180,83,9,0.5)' : 'linear-gradient(135deg,#d97706,#fbbf24)',
                            border: 'none', color: '#0a0e17', fontWeight: 'bold', fontSize: '13px', opacity: exporting && exporting !== 'pptx' ? 0.5 : 1 }}>
                        {exporting === 'pptx' ? '⏳ PowerPoint...' : '📊 PowerPoint'}
                    </button>
                    <a href="index.html" aria-label="Torna alla Home"
                        style={{ padding: '8px 12px', borderRadius: '10px',
                            background: 'rgba(30,41,59,0.8)', border: '1px solid rgba(71,85,105,0.4)',
                            color: '#64748b', textDecoration: 'none', fontSize: '18px' }}>
                        🏠
                    </a>
                </div>

                {/* Preview */}
                <div style={{ flex: 1, overflowY: 'auto', padding: '20px 14px 32px' }}>
                    <ResearchPreview doc={doc}/>
                </div>
            </div>
        );

        /* ── Input ── */
        return (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

                {/* Header */}
                <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: '12px', padding: '14px 16px 12px',
                    background: 'rgba(10,14,23,0.96)', borderBottom: '1px solid rgba(99,102,241,0.15)' }}>
                    <div style={{ fontSize: '28px' }}>📚</div>
                    <div>
                        <div style={{ fontWeight: 900, fontSize: '16px', color: '#c7d2fe' }}>Generatore di Ricerche</div>
                        <div style={{ fontSize: '11px', color: '#475569' }}>Crea una ricerca pronta per la classe</div>
                    </div>
                    <div style={{ flex: 1 }}/>
                    <a href="index.html" aria-label="Torna alla Home"
                        style={{ width: '36px', height: '36px', borderRadius: '10px', display: 'flex',
                            alignItems: 'center', justifyContent: 'center',
                            background: 'rgba(30,41,59,0.8)', border: '1px solid rgba(71,85,105,0.35)',
                            color: '#64748b', textDecoration: 'none', fontSize: '18px' }}>
                        🏠
                    </a>
                </div>

                {/* Scrollable content */}
                <div style={{ flex: 1, overflowY: 'auto', padding: '20px 14px 32px' }}>
                    <div style={{ maxWidth: '640px', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: '16px' }}>

                        {/* Step 1 — Argomento */}
                        <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid rgba(99,102,241,0.25)',
                            borderRadius: '16px', padding: '18px' }}>
                            <div style={{ fontWeight: 'bold', fontSize: '11px', color: '#6366f1',
                                textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '10px' }}>
                                1 — Di cosa vuoi fare la ricerca?
                            </div>
                            <textarea
                                value={topic}
                                onChange={e => { setTopic(e.target.value); setSuggestions(null); setChosenTitle(''); }}
                                placeholder={'Scrivi l\'argomento... es. "La vita dei Romani antichi", "L\'energia solare", "La Resistenza italiana"'}
                                rows={3}
                                style={{ width: '100%', background: 'rgba(30,41,59,0.7)', border: '1px solid rgba(99,102,241,0.3)',
                                    borderRadius: '12px', color: 'white', padding: '12px 14px', fontSize: '14px',
                                    resize: 'vertical', lineHeight: '1.6' }}
                            />
                            <button onClick={suggestTitles} disabled={phase === 'suggesting' || !topic.trim()}
                                style={{ marginTop: '10px', padding: '9px 18px', borderRadius: '10px',
                                    cursor: !topic.trim() || phase === 'suggesting' ? 'default' : 'pointer',
                                    background: 'rgba(99,102,241,0.18)', border: '1px solid rgba(99,102,241,0.45)',
                                    color: '#a5b4fc', fontWeight: 'bold', fontSize: '13px',
                                    opacity: !topic.trim() || phase === 'suggesting' ? 0.5 : 1 }}>
                                {phase === 'suggesting'
                                    ? '⏳ Cerco titoli adatti...'
                                    : '✨ Suggerisci titoli adatti'}
                            </button>
                        </div>

                        {/* Suggestions */}
                        {suggestions && (
                            <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid rgba(99,102,241,0.25)',
                                borderRadius: '16px', padding: '16px' }} className="slide-in">
                                <div style={{ fontWeight: 'bold', fontSize: '11px', color: '#6366f1',
                                    textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '12px' }}>
                                    💡 Titoli suggeriti — toccane uno o scrivi il tuo
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '14px' }}>
                                    {suggestions.map((s, i) => (
                                        <button key={i} onClick={() => setChosenTitle(s.title)}
                                            style={{ textAlign: 'left', padding: '12px 14px', borderRadius: '11px', cursor: 'pointer',
                                                border: chosenTitle === s.title
                                                    ? '2px solid #6366f1'
                                                    : '1px solid rgba(99,102,241,0.2)',
                                                background: chosenTitle === s.title
                                                    ? 'rgba(99,102,241,0.2)'
                                                    : 'rgba(30,41,59,0.6)',
                                                transition: 'all 0.15s' }}>
                                            <div style={{ color: chosenTitle === s.title ? '#c7d2fe' : '#e2e8f0',
                                                fontWeight: 'bold', fontSize: '14px', marginBottom: '4px' }}>
                                                {i + 1}. {s.title}
                                            </div>
                                            <div style={{ color: '#64748b', fontSize: '12px', lineHeight: '1.5' }}>
                                                {s.reason}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                <div style={{ fontSize: '12px', color: '#475569', marginBottom: '6px' }}>
                                    Oppure scrivi tu un titolo personalizzato:
                                </div>
                                <input
                                    value={chosenTitle}
                                    onChange={e => setChosenTitle(e.target.value)}
                                    placeholder="Il titolo della tua ricerca..."
                                    style={{ width: '100%', background: 'rgba(30,41,59,0.7)',
                                        border: '1px solid rgba(99,102,241,0.3)', borderRadius: '10px',
                                        color: 'white', padding: '10px 13px', fontSize: '14px' }}
                                />
                            </div>
                        )}

                        {/* Step 2 — Livello */}
                        <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid rgba(99,102,241,0.25)',
                            borderRadius: '16px', padding: '18px' }}>
                            <div style={{ fontWeight: 'bold', fontSize: '11px', color: '#6366f1',
                                textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '12px' }}>
                                2 — Livello della ricerca
                            </div>
                            <LevelSelector value={level} onChange={setLevel}/>
                        </div>

                        {/* Errore */}
                        {error && (
                            <div style={{ background: 'rgba(127,29,29,0.4)', border: '1px solid rgba(239,68,68,0.4)',
                                borderRadius: '12px', padding: '12px 16px', color: '#fca5a5', fontSize: '13px' }}>
                                ⚠️ {error}
                            </div>
                        )}

                        {/* Genera */}
                        <button onClick={generate} disabled={!topic.trim()}
                            style={{ padding: '16px', borderRadius: '14px', fontWeight: 900, fontSize: '16px',
                                cursor: topic.trim() ? 'pointer' : 'default',
                                background: topic.trim()
                                    ? 'linear-gradient(135deg,#4f46e5,#7c3aed)'
                                    : 'rgba(30,41,59,0.5)',
                                border: 'none', color: 'white',
                                boxShadow: topic.trim() ? '0 4px 24px rgba(99,102,241,0.4)' : 'none',
                                opacity: topic.trim() ? 1 : 0.5, transition: 'all 0.2s' }}>
                            📚 Genera la Ricerca
                        </button>

                        {/* Info */}
                        <div style={{ background: 'rgba(15,23,42,0.5)', border: '1px solid rgba(71,85,105,0.25)',
                            borderRadius: '12px', padding: '14px 16px', fontSize: '12px', color: '#475569', lineHeight: '1.8' }}>
                            <strong style={{ color: '#64748b' }}>Come funziona:</strong><br/>
                            1. Scrivi l'argomento → fatti suggerire titoli adatti<br/>
                            2. Scegli o scrivi il titolo definitivo<br/>
                            3. Seleziona il livello scolastico<br/>
                            4. Genera → scarica PDF o PowerPoint pronto per la classe
                        </div>

                    </div>
                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="game-system.js"></script>
</body>
</html>
