<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduGamer OS - Ricerche</title>
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body {
            background-color: #0a0e17;
            color: #e2e8f0;
            font-family: 'OpenDyslexic', Verdana, sans-serif;
            letter-spacing: 0.02em;
            line-height: 1.6;
            min-height: 100dvh;
            margin: 0; padding: 0;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-enter { animation: slideIn 0.28s ease forwards; }

        @keyframes spin { to { transform: rotate(360deg); } }

            width: 36px; height: 36px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .kbd {
            display: inline-block;
            background: rgba(51,65,85,0.9);
            border: 1px solid #475569;
            border-radius: 5px;
            padding: 1px 6px;
            font-size: 11px;
            font-family: monospace;
            color: #94a3b8;
            line-height: 1.4;
        }

        .chip-selected {
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.5);
            border-radius: 10px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #c7d2fe;
            transition: background 0.15s;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .chip-selected:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }

        .title-option {
            background: rgba(30,41,59,0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.18s;
            width: 100%;
            text-align: left;
        }
        .title-option:hover  { border-color: #6366f1; background: rgba(99,102,241,0.12); }
        .title-option.chosen { border-color: #818cf8; background: rgba(99,102,241,0.22); }

        .research-preview h2 { font-size: 1.05rem; color: #818cf8; margin: 1rem 0 0.4rem; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .research-preview p  { font-size: 0.93rem; color: #cbd5e1; margin-bottom: 0.6rem; }
        .research-preview .kw-block { background: rgba(30,41,59,0.8); border-radius: 8px; padding: 10px 14px; margin-top: 0.8rem; }
        .research-preview .kw-item  { font-size: 0.82rem; color: #94a3b8; }
        .research-preview .kw-item strong { color: #a5b4fc; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── TTS ENGINE ──────────────────────────────────────────── */
function useSpeech() {
    const [speaking, setSpeaking] = useState(false);
    const utterRef = useRef(null);

    const speak = useCallback((text) => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'it-IT';
        utt.rate = 0.92;
        utt.onstart = () => setSpeaking(true);
        utt.onend   = () => setSpeaking(false);
        utt.onerror = () => setSpeaking(false);
        utterRef.current = utt;
        window.speechSynthesis.speak(utt);
    }, []);

    const stop = useCallback(() => {
        window.speechSynthesis?.cancel();
        setSpeaking(false);
    }, []);

    // Ferma la voce se si naviga via
    useEffect(() => () => window.speechSynthesis?.cancel(), []);

    return { speaking, speak, stop };
}

function SpeakBtn({ text, speak, stop, speaking, small }) {
    const base = small
        ? "shrink-0 w-8 h-8 flex items-center justify-center rounded-lg border transition-all active:scale-90"
        : "flex items-center gap-2 px-3 py-2 rounded-xl border transition-all active:scale-95 text-sm font-bold";
    const active = speaking
        ? `${base} border-indigo-400 bg-indigo-900/60 text-indigo-300`
        : `${base} border-slate-600 bg-slate-800/60 text-slate-400 hover:text-white hover:border-slate-400`;
    return (
        <button
            onClick={speaking ? stop : () => speak(text)}
            aria-label={speaking ? "Ferma lettura" : "Ascolta"}
            className={active}>
            {speaking ? '⏹' : '🔊'}
            {!small && <span>{speaking ? 'Ferma' : 'Ascolta'}</span>}
        </button>
    );
}

const MODEL       = 'gemini-3-flash-preview';
const IMAGE_MODEL = 'gemini-3.1-flash-image-preview';
const getKey = () => localStorage.getItem('gemini_api_key') || '';

async function callGemini(prompt) {
    const key = getKey();
    if (!key) throw new Error('API key mancante. Vai in Impostazioni sulla Home e inserisci la chiave Gemini.');
    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.7, responseMimeType: 'application/json' }
            })
        }
    );
    if (!res.ok) {
        if (res.status === 429) throw new Error('Limite giornaliero raggiunto. Riprova tra qualche ora o domani.');
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Errore API ${res.status}`);
    }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    return JSON.parse(raw);
}

async function generateSlideImage(subject) {
    try {
        const key = getKey();
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${key}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Simple flat design illustration for a school presentation slide about: "${subject}". Colorful, educational, no text in the image, clean white background.` }] }],
                    generationConfig: { responseModalities: ['IMAGE'] }
                })
            }
        );
        if (!res.ok) return null;
        const data = await res.json();
        const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
        if (!part) return null;
        return `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
    } catch { return null; }
}

const LEVELS = [
    { key: 'elementari', label: 'Scuola Elementare',  desc: '6–10 anni',  icon: '🐚' },
    { key: 'media',      label: 'Scuola Media',        desc: '11–13 anni', icon: '🧭' },
    { key: 'superiore',  label: 'Scuola Superiore',    desc: '14–18 anni', icon: '⚓' },
    { key: 'adulti',     label: 'Università / Adulti', desc: '19+ anni',   icon: '🏴‍☠️' },
];

function dsaNote(level) {
    if (level !== 'elementari') return '';
    return `
ATTENZIONE — bambino con DSA di 6-10 anni:
- Frasi brevissime: massimo 10 parole ciascuna
- Solo vocabolario semplice; se usi un termine nuovo spiegalo subito con un esempio concreto tratto dall'argomento stesso della ricerca
- Un concetto solo per scheda/sezione, senza digressioni
- Tono caldo, incoraggiante, mai freddo o accademico
- Esempi concreti sempre pertinenti all'argomento della ricerca, non oggetti o situazioni estranee al tema
- Nessun elenco puntato: frasi intere e continue
- Ripeti le informazioni chiave in modo leggermente diverso per rinforzare
- Evita parentesi, note a margine e costruzioni subordinate lunghe`;
}

const CATEGORY_ICONS = {
    storia:      '📜',
    scienze:     '🔬',
    geografia:   '🌍',
    letteratura: '📖',
    matematica:  '📐',
    natura:      '🌿',
    generale:    '📚',
};

/* ── PHASE INPUT ─────────────────────────────────────────── */
function PhaseInput({ onNext }) {
    const [topic, setTopic]           = useState('');
    const [level, setLevel]           = useState('elementari');
    const [loading, setLoading]       = useState(false);
    const [titles, setTitles]         = useState(null);
    const [chosenTitle, setChosenTitle] = useState('');
    const [error, setError]           = useState('');
    const inputRef = useRef();
    const { speaking, speak, stop } = useSpeech();

    useEffect(() => { inputRef.current?.focus(); }, []);

    async function suggestTitles() {
        if (!topic.trim()) { setError('Scrivi prima un argomento!'); return; }
        setError(''); setLoading(true); setTitles(null); setChosenTitle('');
        try {
            const lvlLabel = LEVELS.find(l => l.key === level)?.label;
            const data = await callGemini(`
Sei un tutor scolastico italiano esperto in DSA. Lo studente è in "${lvlLabel}".
${dsaNote(level)}
Argomento indicato: "${topic.trim()}"

Proponi 3 titoli diversi per una ricerca scolastica. I titoli devono essere:
- Chiari, specifici, adatti all'età
- Diversi per angolazione (es. cronologica, tematica, comparativa…)
- In italiano senza gergo tecnico eccessivo

Rispondi SOLO con JSON valido:
{
  "titles": [
    {"title": "...", "why": "Una frase che spiega perché questo angolo è interessante."},
    {"title": "...", "why": "..."},
    {"title": "...", "why": "..."}
  ]
}`);
            setTitles(data.titles || []);
            if (data.titles?.length) setChosenTitle(data.titles[0].title);
        } catch(e) {
            setError(e.message);
        } finally {
            setLoading(false);
        }
    }

    function proceed() {
        const t = chosenTitle.trim() || topic.trim();
        if (!t) { setError('Scegli o scrivi un titolo!'); return; }
        onNext({ topic: topic.trim(), title: t, level });
    }

    return (
        <div className="max-w-2xl mx-auto px-4 py-6">
            <a href="index.html" className="inline-flex items-center gap-2 text-slate-400 hover:text-white text-sm mb-6 transition-colors no-underline">
                ← Torna alla Home
            </a>
            <div className="text-center mb-8">
                <div className="text-5xl mb-3">📚</div>
                <h1 className="text-2xl font-black text-indigo-300 mb-1">COSTRUISCI LA TUA RICERCA</h1>
                <p className="text-slate-400 text-sm">Scegli l'argomento, seleziona le idee che ti interessano, e costruisci la ricerca tua.</p>
            </div>

            <div className="mb-6">
                <label className="block text-xs text-slate-400 mb-2 uppercase tracking-widest">Livello scolastico</label>
                <div className="grid grid-cols-2 gap-2">
                    {LEVELS.map(l => (
                        <button key={l.key} onClick={() => setLevel(l.key)}
                            className={`flex flex-col items-center gap-1 p-3 rounded-xl border transition-all text-sm font-bold
                                ${level === l.key
                                    ? 'bg-indigo-900/60 border-indigo-500 text-indigo-200'
                                    : 'bg-slate-800/50 border-slate-600 text-slate-300 hover:border-slate-400'}`}>
                            <span className="text-xl">{l.icon}</span>
                            <span className="text-xs leading-tight text-center">{l.label}</span>
                            <span className="text-[10px] text-slate-400 font-normal">{l.desc}</span>
                        </button>
                    ))}
                </div>
            </div>

            <div className="mb-4">
                <label className="block text-xs text-slate-400 mb-2 uppercase tracking-widest">Di cosa vuoi parlare?</label>
                <div className="flex gap-2">
                    <input
                        ref={inputRef}
                        type="text"
                        value={topic}
                        onChange={e => { setTopic(e.target.value); setTitles(null); setChosenTitle(''); }}
                        onKeyDown={e => e.key === 'Enter' && !loading && suggestTitles()}
                        placeholder="es. La Seconda Guerra Mondiale, I vulcani, Dante Alighieri…"
                        className="flex-1 bg-slate-900 border border-slate-600 focus:border-indigo-500 rounded-xl px-4 py-3 text-white outline-none transition-colors"
                    />
                    <button onClick={suggestTitles} disabled={loading}
                        className="px-4 py-3 rounded-xl bg-indigo-700 hover:bg-indigo-600 disabled:opacity-50 text-white font-bold transition-all whitespace-nowrap active:scale-95">
                        {loading ? '…' : '💡 Idee'}
                    </button>
                </div>
            </div>

            {error && <p className="text-red-400 text-sm mb-4">{error}</p>}

            {loading && (
                <div className="flex justify-center py-6">
                    <div className="spinner"></div>
                </div>
            )}

            {titles && (
                <div className="mb-6">
                    <label className="block text-xs text-slate-400 mb-3 uppercase tracking-widest">Scegli un titolo (o modificalo)</label>
                    <div className="flex flex-col gap-2 mb-3">
                        {titles.map((t, i) => (
                            <div key={i} className={`title-option ${chosenTitle === t.title ? 'chosen' : ''}`}
                                style={{display:'flex', alignItems:'flex-start', gap:'10px'}}>
                                <button onClick={() => setChosenTitle(t.title)} className="flex-1 text-left">
                                    <div className="font-bold text-white text-sm mb-1">{t.title}</div>
                                    <div className="text-slate-400 text-xs">{t.why}</div>
                                </button>
                                <SpeakBtn text={`${t.title}. ${t.why}`} speak={speak} stop={stop} speaking={speaking} small={true} />
                            </div>
                        ))}
                    </div>
                    <label className="block text-xs text-slate-400 mb-1">Oppure scrivi il tuo titolo:</label>
                    <input
                        type="text"
                        value={chosenTitle}
                        onChange={e => setChosenTitle(e.target.value)}
                        className="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-2 text-white outline-none transition-colors text-sm"
                        placeholder="Titolo personalizzato…"
                    />
                </div>
            )}

            {(titles || topic.trim()) && (
                <button onClick={proceed} disabled={!topic.trim()}
                    className="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-700 to-purple-700 hover:from-indigo-600 hover:to-purple-600 text-white font-black text-lg transition-all active:scale-95 shadow-lg disabled:opacity-40">
                    🃏 Inizia a sfogliare le schede →
                </button>
            )}
        </div>
    );
}

/* ── PHASE CARDS ─────────────────────────────────────────── */
function PhaseCards({ topic, title, level, onDone }) {
    const [cards, setCards]       = useState(null);
    const [selected, setSelected] = useState([]);
    const [current, setCurrent]   = useState(0);
    const [loading, setLoading]   = useState(true);
    const [error, setError]       = useState('');
    const [category, setCategory] = useState('generale');
    const [animKey, setAnimKey]   = useState(0);
    const { speaking, speak, stop } = useSpeech();

    useEffect(() => { generateCards(); }, []);

    // Auto-leggi la scheda quando cambia
    useEffect(() => {
        if (cards && cards[current]) {
            speak(`${cards[current].concept}. ${cards[current].text}`);
        }
    }, [animKey]);

    useEffect(() => {
        function onKey(e) {
            if (!cards) return;
            if (e.key === 'Enter')     handleKeep();
            if (e.key === ' ')         { e.preventDefault(); handleSkip(); }
            if (e.key === 'ArrowLeft') handleBack();
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
    });

    async function generateCards() {
        setLoading(true); setError('');
        try {
            const lvlLabel = LEVELS.find(l => l.key === level)?.label;
            const data = await callGemini(`
Sei un tutor scolastico italiano esperto in DSA. Lo studente è in "${lvlLabel}".
${dsaNote(level)}
Argomento: "${topic}" — Titolo ricerca: "${title}"

Genera esattamente 12 schede-concetto per costruire questa ricerca. Ogni scheda deve:
- Avere un "concept" breve (3-6 parole), come titolo di un paragrafo
- Avere un "text" di 2-3 frasi semplici e chiare, senza elenchi puntati
- Essere autosufficiente (comprensibile anche da sola)
- Coprire angolazioni diverse: contesto, cause, effetti, personaggi, dati, curiosità, confronti…

Scegli la categoria più adatta tra: storia, scienze, geografia, letteratura, matematica, natura, generale.

Rispondi SOLO con JSON valido:
{
  "category": "storia",
  "cards": [
    {"id": 1, "concept": "Titolo breve", "text": "Frase uno. Frase due. Frase tre."},
    {"id": 2, "concept": "...", "text": "..."},
    {"id": 3, "concept": "...", "text": "..."},
    {"id": 4, "concept": "...", "text": "..."},
    {"id": 5, "concept": "...", "text": "..."},
    {"id": 6, "concept": "...", "text": "..."},
    {"id": 7, "concept": "...", "text": "..."},
    {"id": 8, "concept": "...", "text": "..."},
    {"id": 9, "concept": "...", "text": "..."},
    {"id": 10, "concept": "...", "text": "..."},
    {"id": 11, "concept": "...", "text": "..."},
    {"id": 12, "concept": "...", "text": "..."}
  ]
}`);
            setCards(data.cards || []);
            setCategory(data.category || 'generale');
        } catch(e) {
            setError(e.message);
        } finally {
            setLoading(false);
        }
    }

    function advance() {
        setAnimKey(k => k + 1);
        setCurrent(c => Math.min(cards.length - 1, c + 1));
    }

    function handleKeep() {
        if (!cards || current >= cards.length) return;
        const card = cards[current];
        if (selected.length < 8 && !selected.find(s => s.id === card.id)) {
            setSelected(prev => [...prev, card]);
        }
        if (current < cards.length - 1) advance();
    }

    function handleSkip() {
        if (!cards) return;
        if (current < cards.length - 1) advance();
    }

    function handleBack() {
        if (current > 0) {
            setAnimKey(k => k + 1);
            setCurrent(c => c - 1);
        }
    }

    function removeSelected(id) {
        setSelected(prev => prev.filter(s => s.id !== id));
    }

    if (loading) return (
        <div className="flex flex-col items-center justify-center min-h-screen gap-4">
            <div className="spinner"></div>
            <p className="text-slate-400 text-sm">Preparo le schede per "{title}"…</p>
        </div>
    );

    if (error) return (
        <div className="max-w-md mx-auto px-4 py-16 text-center">
            <p className="text-red-400 mb-4">{error}</p>
            <button onClick={generateCards} className="px-6 py-3 rounded-xl bg-indigo-700 hover:bg-indigo-600 text-white font-bold">Riprova</button>
        </div>
    );

    if (!cards) return null;

    const card       = cards[current];
    const isSelected = !!selected.find(s => s.id === card.id);
    const catIcon    = CATEGORY_ICONS[category] || '📚';
    const progress   = (current / Math.max(cards.length - 1, 1)) * 100;
    const canFinish  = selected.length >= 3;
    const atLast     = current === cards.length - 1;

    return (
        <div className="min-h-screen flex flex-col md:flex-row md:items-start md:justify-center gap-0 md:gap-6 px-0 md:px-6 py-0 md:py-8 max-w-4xl mx-auto">

            {/* COLONNA SINISTRA — carta corrente */}
            <div className="flex-1 max-w-lg flex flex-col px-4 pt-6 pb-4 md:pt-8">
                <div className="flex items-center gap-3 mb-4">
                    <a href="index.html" className="text-slate-500 hover:text-white transition-colors text-xl no-underline">←</a>
                    <div className="flex-1">
                        <p className="text-xs text-slate-500 truncate">{title}</p>
                        <div className="h-1.5 bg-slate-800 rounded-full mt-1 overflow-hidden">
                            <div className="h-full bg-indigo-500 transition-all duration-300 rounded-full" style={{width:`${progress}%`}}></div>
                        </div>
                    </div>
                    <span className="text-xs text-slate-400 shrink-0">{current + 1}/{cards.length}</span>
                </div>

                <div key={animKey} className="card-enter flex-1 flex flex-col">
                    <div className={`rounded-2xl border p-6 flex flex-col gap-4 shadow-xl flex-1 relative
                        ${isSelected
                            ? 'bg-indigo-950/60 border-indigo-500'
                            : 'bg-slate-800/80 border-slate-600'}`}>
                        <button
                            onClick={speaking ? stop : () => speak(`${card.concept}. ${card.text}`)}
                            aria-label={speaking ? 'Ferma lettura' : 'Ascolta'}
                            className={`absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-lg border transition-all active:scale-90 ${speaking ? 'border-indigo-400 bg-indigo-900/70 text-indigo-300' : 'border-slate-600 bg-slate-900/60 text-slate-400 hover:text-white hover:border-slate-400'}`}>
                            {speaking ? '⏹' : '🔊'}
                        </button>
                        <div className="flex items-start gap-3">
                            <span className="text-3xl">{catIcon}</span>
                            <div className="pr-8">
                                <p className="text-[10px] uppercase tracking-widest text-slate-500 mb-0.5">Scheda {current + 1}</p>
                                <h2 className="text-xl font-black text-white leading-tight">{card.concept}</h2>
                            </div>
                        </div>
                        <p className="text-slate-200 text-base leading-relaxed flex-1">{card.text}</p>
                        {isSelected && (
                            <p className="text-indigo-300 text-xs font-bold">✓ Già selezionata</p>
                        )}
                    </div>

                    <div className="flex gap-3 mt-4">
                        <button onClick={handleBack} disabled={current === 0}
                            aria-label="Torna alla scheda precedente"
                            className="px-4 py-3 rounded-xl border border-slate-600 bg-slate-800 hover:bg-slate-700 text-slate-300 disabled:opacity-30 transition-all active:scale-95">
                            ←
                        </button>
                        <button onClick={handleSkip}
                            className="flex-1 py-3 rounded-xl border border-slate-600 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold transition-all active:scale-95">
                            {atLast ? 'Fine schede' : 'Salta →'}
                        </button>
                        <button onClick={handleKeep} disabled={selected.length >= 8}
                            className="flex-1 py-3 rounded-xl bg-indigo-700 hover:bg-indigo-600 disabled:opacity-40 text-white font-black transition-all active:scale-95 shadow-md">
                            {isSelected ? '✓ Presa' : '+ Prendi'}
                        </button>
                    </div>

                    <p className="text-center text-[10px] text-slate-600 mt-2 hidden md:block">
                        <span className="kbd">Enter</span> prendi &nbsp;
                        <span className="kbd">Space</span> salta &nbsp;
                        <span className="kbd">←</span> indietro
                    </p>
                </div>
            </div>

            {/* COLONNA DESTRA — pannello selezione */}
            <div className="md:w-72 md:sticky md:top-36 px-4 pb-6 md:pb-0">
                <div className="bg-slate-900/80 rounded-2xl border border-slate-700 p-4">
                    <div className="flex items-center justify-between mb-3">
                        <h3 className="text-sm font-black text-indigo-300">
                            Le tue schede <span className="text-slate-400 font-normal">({selected.length}/8)</span>
                        </h3>
                        {selected.length < 3 && (
                            <span className="text-[10px] text-slate-500">minimo 3</span>
                        )}
                    </div>

                    {selected.length === 0 && (
                        <p className="text-slate-500 text-xs text-center py-4">Ancora nessuna scheda.<br/>Premi <strong>+ Prendi</strong> per aggiungerla.</p>
                    )}

                    <div className="flex flex-col gap-2 mb-4 max-h-64 md:max-h-80 overflow-y-auto pr-1">
                        {selected.map((s, i) => (
                            <button key={s.id} onClick={() => removeSelected(s.id)}
                                className="chip-selected" title="Clicca per rimuovere">
                                <span className="text-slate-500 text-xs shrink-0">{i+1}</span>
                                <span className="flex-1 truncate">{s.concept}</span>
                                <span className="text-slate-500 text-xs shrink-0">✕</span>
                            </button>
                        ))}
                    </div>

                    {selected.length >= 8 && (
                        <p className="text-amber-400 text-xs text-center mb-3">Massimo raggiunto (8)</p>
                    )}

                    <button onClick={() => onDone(selected, title, level, category)}
                        disabled={!canFinish}
                        className="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-700 to-purple-700 hover:from-indigo-600 hover:to-purple-600 text-white font-black transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed text-sm shadow-lg">
                        {canFinish ? '✍️ Componi la ricerca →' : `Scegli ancora ${3 - selected.length}`}
                    </button>
                </div>
            </div>
        </div>
    );
}

/* ── PHASE REVIEW ────────────────────────────────────────── */
function PhaseReview({ selected, title, level, category, onConfirm, onBack }) {
    const [sel, setSel] = useState(selected);
    const catIcon = CATEGORY_ICONS[category] || '📚';

    return (
        <div className="max-w-xl mx-auto px-4 py-8">
            <button onClick={onBack} className="text-slate-400 hover:text-white text-sm mb-6 transition-colors">← Torna alle schede</button>
            <div className="text-center mb-6">
                <div className="text-4xl mb-2">{catIcon}</div>
                <h1 className="text-xl font-black text-white mb-1">{title}</h1>
                <p className="text-slate-400 text-sm">Rivedi le schede. Puoi rimuovere quelle che non vuoi.</p>
            </div>

            <div className="flex flex-col gap-3 mb-6">
                {sel.map((s, i) => (
                    <div key={s.id} className="bg-slate-800/80 border border-slate-700 rounded-xl p-4 flex gap-3">
                        <span className="text-slate-500 text-sm shrink-0 w-5 text-right">{i+1}.</span>
                        <div className="flex-1 min-w-0">
                            <p className="font-bold text-indigo-300 text-sm mb-1 truncate">{s.concept}</p>
                            <p className="text-slate-400 text-xs leading-relaxed">{s.text}</p>
                        </div>
                        <button onClick={() => setSel(prev => prev.filter(c => c.id !== s.id))}
                            aria-label="Rimuovi scheda"
                            className="text-slate-600 hover:text-red-400 transition-colors shrink-0 text-lg leading-none">✕</button>
                    </div>
                ))}
            </div>

            {sel.length < 3 && (
                <p className="text-amber-400 text-sm text-center mb-4">Servono almeno 3 schede. Torna indietro per aggiungerne.</p>
            )}

            <button onClick={() => onConfirm(sel)} disabled={sel.length < 3}
                className="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-700 to-purple-700 hover:from-indigo-600 hover:to-purple-600 text-white font-black text-lg transition-all active:scale-95 disabled:opacity-30 shadow-lg">
                🚀 Componi la ricerca!
            </button>
        </div>
    );
}

/* ── PHASE COMPOSING ─────────────────────────────────────── */
function PhaseComposing() {
    return (
        <div className="flex flex-col items-center justify-center min-h-screen gap-5 px-4 text-center">
            <div className="spinner"></div>
            <h2 className="text-xl font-black text-indigo-300">Il Tutor sta scrivendo…</h2>
            <p className="text-slate-400 text-sm max-w-xs">Compongo la ricerca usando solo le schede che hai scelto tu.</p>
        </div>
    );
}

/* ── PHASE RESULT ────────────────────────────────────────── */
function PhaseResult({ research, title, level, selected, onRestart }) {
    const [exportingPdf, setExportingPdf]     = useState(false);
    const [exportingPptx, setExportingPptx]   = useState(false);
    const [pptxStatus, setPptxStatus]         = useState('');
    const { speaking, speak, stop } = useSpeech();

    function buildFullText() {
        const parts = [];
        if (research.intro) parts.push(research.intro);
        (research.sections || []).forEach(s => parts.push(`${s.heading}. ${s.content}`));
        if (research.conclusion) parts.push(`Conclusione. ${research.conclusion}`);
        return parts.join(' ');
    }

    function safeFileName() {
        return title.replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_').slice(0,40) || 'ricerca';
    }

    async function exportPDF() {
        setExportingPdf(true);
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const W = 210, H = 297;
            const mL = 22, mR = 22, mT = 30, mB = 24;
            const cW = W - mL - mR;

            const rgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];

            const newPage = () => {
                doc.addPage();
                doc.setFillColor(255,255,255); doc.rect(0,0,W,H,'F');
                doc.setFillColor(...rgb('#3730a3')); doc.rect(0,0,W,5,'F');
                return 18;
            };

            // Sfondo bianco + banda top
            doc.setFillColor(255,255,255); doc.rect(0,0,W,H,'F');
            doc.setFillColor(...rgb('#3730a3')); doc.rect(0,0,W,6,'F');

            let y = mT;

            // Titolo
            doc.setFont('helvetica','bold'); doc.setFontSize(18);
            doc.setTextColor(...rgb('#1e1b4b'));
            const tLines = doc.splitTextToSize(title.toUpperCase(), cW);
            doc.text(tLines, mL, y); y += tLines.length * 8 + 2;

            // Linea + livello
            doc.setDrawColor(...rgb('#4338ca')); doc.setLineWidth(0.4);
            doc.line(mL, y, W - mR, y); y += 6;
            doc.setFont('helvetica','normal'); doc.setFontSize(9);
            doc.setTextColor(...rgb('#6b7280'));
            doc.text(LEVELS.find(l => l.key === level)?.label || '', mL, y); y += 9;

            // Testo helper
            const addText = (text, size, color, bold) => {
                doc.setFont('helvetica', bold ? 'bold' : 'normal');
                doc.setFontSize(size);
                doc.setTextColor(...rgb(color));
                const lines = doc.splitTextToSize(text, cW);
                lines.forEach(line => {
                    if (y > H - mB - 6) { y = newPage(); doc.setFont('helvetica', bold ? 'bold' : 'normal'); doc.setFontSize(size); doc.setTextColor(...rgb(color)); }
                    doc.text(line, mL, y); y += size * 0.42;
                });
            };

            const addHeading = (text) => {
                if (y > H - mB - 20) y = newPage();
                doc.setFont('helvetica','bold'); doc.setFontSize(12);
                doc.setTextColor(...rgb('#3730a3'));
                doc.text(text, mL, y); y += 8;
            };

            if (research.intro) { addText(research.intro, 10, '#1f2937', false); y += 6; }

            (research.sections || []).forEach(sec => {
                addHeading(sec.heading);
                addText(sec.content, 10, '#1f2937', false); y += 6;
            });

            if (research.conclusion) { addHeading('Conclusione'); addText(research.conclusion, 10, '#1f2937', false); y += 6; }

            if (research.keywords?.length) {
                addHeading('Parole chiave');
                research.keywords.forEach(kw => {
                    if (y > H - mB - 8) y = newPage();
                    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...rgb('#1f2937'));
                    doc.text(`${kw.term}: `, mL, y);
                    const tw = doc.getTextWidth(`${kw.term}: `);
                    doc.setFont('helvetica','normal'); doc.setTextColor(...rgb('#374151'));
                    const dLines = doc.splitTextToSize(kw.definition, cW - tw - 2);
                    doc.text(dLines[0] || '', mL + tw, y); y += 5;
                    dLines.slice(1).forEach(dl => { doc.text(dl, mL + 2, y); y += 5; });
                    y += 1;
                });
            }

            // Banda bottom ultima pagina
            doc.setFillColor(...rgb('#3730a3')); doc.rect(0, H - 4, W, 4, 'F');

            doc.save(`${safeFileName()}.pdf`);
        } catch(e) {
            alert('Errore PDF: ' + e.message);
        } finally {
            setExportingPdf(false);
        }
    }

    async function exportPPTX() {
        setExportingPptx(true);
        try {
            const INDIGO = '3730a3', WHITE = 'FFFFFF', DARK = '1e293b';

            // Raccogli le slide da generare (con immagine)
            const slideItems = [];
            if (research.intro) slideItems.push({ heading: 'Introduzione', body: research.intro });
            (research.sections || []).forEach(sec => slideItems.push({ heading: sec.heading, body: sec.content }));
            if (research.conclusion) slideItems.push({ heading: 'Conclusione', body: research.conclusion });

            // Genera immagini in parallelo
            setPptxStatus(`Genero ${slideItems.length} immagini…`);
            const images = await Promise.all(
                slideItems.map(item => generateSlideImage(`${item.heading}: ${item.body.slice(0, 120)}`))
            );

            setPptxStatus('Compongo la presentazione…');
            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_16x9';

            const addSlide = (heading, body, imgData) => {
                const sl = pptx.addSlide();
                sl.background = { color: WHITE };
                // Banda header
                sl.addShape(pptx.ShapeType.rect, { x:0, y:0, w:10, h:0.55, fill:{ color:INDIGO } });
                sl.addText(heading, { x:0.4, y:0.08, w:9.2, h:0.42, fontSize:18, bold:true, color:WHITE, fontFace:'Helvetica' });
                if (imgData) {
                    // Layout 60/40: testo sinistra, immagine destra
                    sl.addText(body, { x:0.4, y:0.7, w:5.6, h:4.6, fontSize:13, color:DARK, fontFace:'Helvetica', wrap:true, valign:'top', align:'left' });
                    sl.addImage({ data: imgData, x:6.1, y:0.7, w:3.6, h:3.6, sizing:{ type:'contain', w:3.6, h:3.6 } });
                } else {
                    // Layout full-width senza immagine
                    sl.addText(body, { x:0.4, y:0.7, w:9.2, h:4.6, fontSize:14, color:DARK, fontFace:'Helvetica', wrap:true, valign:'top', align:'left' });
                }
            };

            // Copertina
            const cover = pptx.addSlide();
            cover.background = { color: INDIGO };
            cover.addText(title, { x:0.5, y:1.5, w:9, h:2, fontSize:34, bold:true, color:WHITE, align:'center', fontFace:'Helvetica' });
            cover.addText(LEVELS.find(l => l.key === level)?.label || '', { x:0.5, y:3.7, w:9, h:0.5, fontSize:16, color:'c7d2fe', align:'center', fontFace:'Helvetica' });
            cover.addText('EduGamer OS', { x:0.5, y:4.6, w:9, h:0.4, fontSize:12, color:'6366f1', align:'center', fontFace:'Helvetica' });

            slideItems.forEach((item, i) => addSlide(item.heading, item.body, images[i]));

            if (research.keywords?.length) {
                const kwText = research.keywords.map(kw => `${kw.term}: ${kw.definition}`).join('\n\n');
                addSlide('Parole chiave', kwText, null);
            }

            await pptx.writeFile({ fileName: `${safeFileName()}.pptx` });
        } catch(e) {
            alert('Errore PowerPoint: ' + e.message);
        } finally {
            setExportingPptx(false);
            setPptxStatus('');
        }
    }

    return (
        <div className="max-w-2xl mx-auto px-4 py-8">
            <div className="text-center mb-6">
                <div className="text-5xl mb-2">🎉</div>
                <h1 className="text-2xl font-black text-white mb-1">Ricerca completata!</h1>
                <p className="text-indigo-300 font-bold text-sm">{title}</p>
                <div className="inline-flex items-center gap-2 mt-2 bg-yellow-900/40 border border-yellow-600 rounded-full px-4 py-1 text-yellow-300 text-xs font-bold">
                    +50 XP guadagnati!
                </div>
                <div className="mt-3">
                    <SpeakBtn text={buildFullText()} speak={speak} stop={stop} speaking={speaking} small={false} />
                </div>
            </div>

            {/* Preview */}
            <div className="research-preview bg-slate-800/60 border border-slate-700 rounded-2xl p-6 mb-6 max-h-96 overflow-y-auto">
                {research.intro && <p>{research.intro}</p>}
                {(research.sections || []).map((sec, i) => (
                    <div key={i}>
                        <h2>{sec.heading}</h2>
                        <p>{sec.content}</p>
                    </div>
                ))}
                {research.conclusion && (<><h2>Conclusione</h2><p>{research.conclusion}</p></>)}
                {research.keywords?.length > 0 && (
                    <div className="kw-block">
                        <p className="text-xs font-bold text-indigo-300 mb-2">Parole chiave</p>
                        {research.keywords.map((kw, i) => (
                            <p key={i} className="kw-item"><strong>{kw.term}:</strong> {kw.definition}</p>
                        ))}
                    </div>
                )}
            </div>

            {/* Schede usate */}
            <div className="mb-6">
                <p className="text-xs text-slate-500 mb-2 uppercase tracking-widest">Schede che hai scelto ({selected.length})</p>
                <div className="flex flex-wrap gap-2">
                    {selected.map(s => (
                        <span key={s.id} className="text-xs bg-indigo-900/40 border border-indigo-700 text-indigo-300 px-3 py-1 rounded-full">
                            {s.concept}
                        </span>
                    ))}
                </div>
            </div>

            {/* Export */}
            <div className="grid grid-cols-2 gap-3 mb-3">
                <button onClick={exportPDF} disabled={exportingPdf}
                    className="flex items-center justify-center gap-2 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-bold transition-all active:scale-95 disabled:opacity-50">
                    {exportingPdf ? '…' : '📄'} PDF
                </button>
                <button onClick={exportPPTX} disabled={exportingPptx}
                    className="flex flex-col items-center justify-center gap-0.5 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-bold transition-all active:scale-95 disabled:opacity-50">
                    <span>{exportingPptx ? '⏳' : '📊'} PowerPoint</span>
                    {pptxStatus && <span className="text-[10px] text-slate-300 font-normal">{pptxStatus}</span>}
                </button>
            </div>
            <div className="grid grid-cols-2 gap-3">
                <button onClick={onRestart}
                    className="py-3 rounded-xl border border-slate-600 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold transition-all active:scale-95">
                    🔁 Nuova ricerca
                </button>
                <a href="index.html"
                    className="flex items-center justify-center py-3 rounded-xl bg-indigo-700 hover:bg-indigo-600 text-white font-bold transition-all active:scale-95 no-underline">
                    🏠 Home
                </a>
            </div>
        </div>
    );
}

/* ── APP ROOT ────────────────────────────────────────────── */
function App() {
    const [phase, setPhase]         = useState('input');
    const [inputData, setInputData] = useState(null);
    const [selected, setSelected]   = useState([]);
    const [category, setCategory]   = useState('generale');
    const [research, setResearch]   = useState(null);
    const [error, setError]         = useState('');

    function handleInputNext(data) { setInputData(data); setPhase('cards'); }

    function handleCardsDone(sel, title, level, cat) {
        setSelected(sel); setCategory(cat); setPhase('review');
    }

    function handleReviewConfirm(finalSel) {
        setSelected(finalSel);
        composeResearch(finalSel);
    }

    async function composeResearch(finalSel) {
        setPhase('composing'); setError('');
        try {
            const lvlLabel = LEVELS.find(l => l.key === inputData.level)?.label;
            const cardsText = finalSel.map((c, i) => `${i+1}. ${c.concept}: ${c.text}`).join('\n');

            const data = await callGemini(`
Sei un tutor scolastico italiano esperto in DSA. Lo studente è in "${lvlLabel}".
${dsaNote(inputData.level)}
Scrivi una ricerca scolastica con titolo: "${inputData.title}"

Usa ESCLUSIVAMENTE queste schede-concetto scelte dallo studente, senza aggiungere informazioni esterne:
${cardsText}

La ricerca deve:
- Essere in italiano chiaro, adatto all'età
- Avere frasi brevi (max 25 parole), zero gergo tecnico non spiegato
- Connettere le schede in un testo scorrevole e coerente
- Avere una sezione per ogni 1-2 schede

Rispondi SOLO con JSON valido:
{
  "intro": "Paragrafo introduttivo (4-5 frasi).",
  "sections": [
    {"heading": "Titolo sezione", "content": "3-5 frasi."}
  ],
  "conclusion": "Paragrafo conclusivo (3-4 frasi).",
  "keywords": [
    {"term": "Parola", "definition": "Breve definizione in una frase."}
  ]
}`);
            setResearch(data);
            if (window.EduGamer) window.EduGamer.addXP(50, 'ricerche', 'research_complete');
            setPhase('result');
        } catch(e) {
            setError(e.message);
            setPhase('review');
        }
    }

    function restart() {
        setPhase('input'); setInputData(null);
        setSelected([]); setResearch(null); setError('');
    }

    return (
        <div className="min-h-screen">
            {error && (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-red-900/90 border border-red-500 text-red-200 px-4 py-2 rounded-xl text-sm max-w-sm text-center shadow-xl">
                    {error}
                    <button onClick={() => setError('')} className="ml-3 text-red-400 hover:text-white">✕</button>
                </div>
            )}
            {phase === 'input' && <PhaseInput onNext={handleInputNext} />}
            {phase === 'cards' && inputData && (
                <PhaseCards topic={inputData.topic} title={inputData.title} level={inputData.level} onDone={handleCardsDone} />
            )}
            {phase === 'review' && inputData && (
                <PhaseReview selected={selected} title={inputData.title} level={inputData.level}
                    category={category} onConfirm={handleReviewConfirm} onBack={() => setPhase('cards')} />
            )}
            {phase === 'composing' && <PhaseComposing />}
            {phase === 'result' && research && inputData && (
                <PhaseResult research={research} title={inputData.title} level={inputData.level}
                    selected={selected} onRestart={restart} />
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script src="game-system.js"></script>
</body>
