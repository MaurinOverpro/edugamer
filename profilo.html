<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo - EduGamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
    
    <!-- GAME SYSTEM -->
    <script src="game-system.js"></script>

    <style>
        * { letter-spacing: 0.02em; }
        html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { 
            background: linear-gradient(135deg, #0a0e17 0%, #1a1a2e 100%);
            color: white; 
            font-family: 'OpenDyslexic', Verdana, sans-serif;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* XP BAR */
        .xp-bar-bg {
            background: #1e293b;
            border-radius: 9999px;
            height: 24px;
            overflow: hidden;
            position: relative;
        }
        .xp-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .xp-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            to { left: 100%; }
        }

        /* ACHIEVEMENT CARD */
        .achievement-card {
            transition: all 0.2s;
        }
        .achievement-card:hover {
            transform: translateY(-2px);
        }
        .achievement-locked {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        /* RARITY COLORS */
        .rarity-comune { border-color: #94a3b8; }
        .rarity-raro { border-color: #3b82f6; }
        .rarity-epico { border-color: #a855f7; }
        .rarity-leggendario { border-color: #fbbf24; }

        /* STAT CARD */
        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        /* STREAK FIRE */
        .streak-fire {
            animation: flicker 0.5s infinite alternate;
        }
        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* TAB BUTTONS */
        .tab-btn {
            transition: all 0.2s;
        }
        .tab-btn.active {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const IMAGE_MODEL = "gemini-3-pro-image-preview";

        const PIRATE_LEVELS = {
            1: "a young cheerful pirate apprentice with a tiny bandana and big curious eyes, just starting their adventure on the seas",
            2: "a young pirate wearing a straw hat, carrying a small sword, with a determined and hopeful expression",
            3: "a brave pirate with a cutlass, a few battle scars, a confident grin, and a colorful bandana",
            4: "a seasoned pirate explorer with a worn long coat, a compass, and battle-hardened eyes full of experience",
            5: "a powerful pirate warrior dual-wielding swords, muscular build, fierce eyes, impressive stance",
            6: "a pirate champion with a magnificent flowing coat, a unique legendary weapon, and a commanding powerful presence",
            7: "a legendary pirate with glowing supernatural powers, an elaborate ornate outfit, radiating immense strength",
            8: "a grandmaster pirate warlord in an epic black coat with golden details, surrounded by an aura of dark power",
            9: "an emperor-level pirate with divine aura, golden accessories, terrifying power, commander of thousands",
            10: "the Pirate King at the absolute peak of power, wearing a legendary crown, radiating ultimate freedom and unstoppable strength"
        };

        const App = () => {
            const [stats, setStats] = useState(null);
            const [level, setLevel] = useState(null);
            const [progress, setProgress] = useState(null);
            const [achievements, setAchievements] = useState([]);
            const [activeTab, setActiveTab] = useState('overview');
            const [showResetModal, setShowResetModal] = useState(false);
            const [tapCount, setTapCount] = useState(0);

            // Wanted Poster
            const [playerName, setPlayerName] = useState('');
            const [generatedPoster, setGeneratedPoster] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [posterError, setPosterError] = useState(null);

            // Carica dati
            const loadData = () => {
                if (window.EduGamer) {
                    setStats(window.EduGamer.getStats());
                    setLevel(window.EduGamer.getLevel());
                    setProgress(window.EduGamer.getProgress());
                    setAchievements(window.EduGamer.getAchievements());
                }
            };

            useEffect(() => {
                loadData();
                
                // Ascolta aggiornamenti
                const handleUpdate = () => loadData();
                window.addEventListener('edugamer-stats-updated', handleUpdate);
                window.addEventListener('edugamer-xp-added', handleUpdate);
                
                return () => {
                    window.removeEventListener('edugamer-stats-updated', handleUpdate);
                    window.removeEventListener('edugamer-xp-added', handleUpdate);
                };
            }, []);

            // Reset nascosto: tocca 5 volte velocemente il titolo
            const handleTitleTap = () => {
                const newCount = tapCount + 1;
                setTapCount(newCount);
                
                if (newCount >= 5) {
                    setShowResetModal(true);
                    setTapCount(0);
                }
                
                // Reset contatore dopo 2 secondi
                setTimeout(() => setTapCount(0), 2000);
            };

            // Funzione di reset
            const performReset = () => {
                localStorage.removeItem('edu_xp');
                localStorage.removeItem('edu_level');
                localStorage.removeItem('edu_achievements');
                localStorage.removeItem('edu_streak');
                localStorage.removeItem('edu_stats');
                localStorage.removeItem('edu_last_activity');
                localStorage.removeItem('lavagna_interactive_v2');
                setShowResetModal(false);
                window.location.reload();
            };

            // Stato per menu report
            const [showReportMenu, setShowReportMenu] = React.useState(false);

            // Genera testo report
            const generateReport = () => {
                const oggi = new Date();
                const dataReport = oggi.toLocaleDateString('it-IT', { 
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
                });
                
                // Calcola valutazione automatica
                let valutazione = '';
                if (stats.currentStreak >= 5) {
                    valutazione = 'Ottimo! Sta usando l\'app con costanza!';
                } else if (stats.currentStreak >= 3) {
                    valutazione = 'Buon utilizzo, continua cosi!';
                } else if (stats.totalActivities > 0) {
                    valutazione = 'Ha iniziato a usare l\'app. Incoraggialo a continuare!';
                } else {
                    valutazione = 'Non ha ancora usato l\'app questa settimana.';
                }

                const report = `REPORT EDUGAMER
${dataReport}

LIVELLO E PROGRESSI
Livello: ${level.level} - ${level.name}
XP Totali: ${stats.totalXP}
Trofei sbloccati: ${achievements.filter(a => a.unlocked).length}/${achievements.length}

COSTANZA
Streak attuale: ${stats.currentStreak} giorni consecutivi
Record streak: ${stats.maxStreak} giorni

ATTIVITA COMPLETATE
Problemi matematica risolti: ${stats.problemsSolved}
Testi controllati: ${stats.textsChecked}
Testi perfetti (zero errori): ${stats.perfectTexts}
Mappe mentali create: ${stats.mapsCreated}
Domande al tutor: ${stats.tutorQuestions}
Quiz completati: ${stats.quizCompleted}

VALUTAZIONE
${valutazione}

---
Report generato da EduGamer`;

                return report;
            };

            // Condividi via WhatsApp
            const shareReportWhatsApp = () => {
                const report = generateReport();
                const msg = encodeURIComponent(report);
                window.open(`https://wa.me/?text=${msg}`, '_blank');
                setShowReportMenu(false);
            };

            // Condividi via Email
            const shareReportEmail = () => {
                const report = generateReport();
                const subject = encodeURIComponent(`Report EduGamer - ${new Date().toLocaleDateString('it-IT')}`);
                const body = encodeURIComponent(report);
                window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
                setShowReportMenu(false);
            };

            // Salva come file
            const saveReportFile = () => {
                const report = generateReport();
                const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `report_edugamer_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setShowReportMenu(false);
            };

            const generateWantedPoster = async () => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) return;
                setIsGenerating(true);
                setPosterError(null);
                setGeneratedPoster(null);
                const lvl = Math.min(Math.max(level.level, 1), 10);
                const bounty = (stats.totalXP * 1000000).toLocaleString('it-IT');
                const prompt = `Create a One Piece anime manga style WANTED poster image, faithful to the iconic style of the series.

Layout and style:
- Aged parchment/sepia warm paper texture as background
- Thick black decorative border frame around the whole poster
- Bold vintage serif "WANTED" text at the very top
- "DEAD OR ALIVE" text just below in smaller bold letters
- Central hand-drawn manga portrait illustration of: ${PIRATE_LEVELS[lvl]}. The character fills the portrait area, drawn in the exact One Piece manga/anime art style by Eiichiro Oda.
- The pirate name "${playerName.toUpperCase()}" in large bold text at the bottom of the portrait
- Bounty amount "Berry ${bounty}" displayed prominently below the name
- "MARINE" official seal/stamp at the very bottom center
- Warm golden-brown vintage color palette, sepia tones

Make it look exactly like the iconic wanted posters from the One Piece anime series. Portrait only, no background scene.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseModalities: ["IMAGE"] }
                        })
                    });
                    const data = await res.json();
                    const parts = data?.candidates?.[0]?.content?.parts || [];
                    const imgPart = parts.find(p => p.inlineData);
                    if (imgPart) {
                        setGeneratedPoster({ data: imgPart.inlineData.data, mime: imgPart.inlineData.mimeType });
                    } else {
                        setPosterError("Nessuna immagine ricevuta. Riprova!");
                    }
                } catch(e) {
                    setPosterError("Errore di rete. Controlla la connessione.");
                }
                setIsGenerating(false);
            };

            const downloadPoster = () => {
                if (!generatedPoster) return;
                const a = document.createElement('a');
                a.href = `data:${generatedPoster.mime};base64,${generatedPoster.data}`;
                a.download = `wanted_${playerName}_lv${level.level}_edugamer.png`;
                a.click();
            };

            if (!stats || !level) {
                return (
                    <div className="h-full flex items-center justify-center">
                        <div className="text-2xl">⏳ Caricamento...</div>
                    </div>
                );
            }

            const unlockedCount = achievements.filter(a => a.unlocked).length;

            return (
                <div className="h-full flex flex-col p-3 gap-3">
                    {/* HEADER */}
                    <div className="flex gap-2 shrink-0">
                        <a href="index.html" className="bg-slate-700 text-white px-4 rounded-xl font-bold flex items-center justify-center text-lg active:scale-95">
                            🏠
                        </a>
                        <div className="flex-1 bg-slate-800 rounded-xl p-3 flex items-center gap-3">
                            <div className="text-4xl">{level.icon}</div>
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-1">
                                    <span 
                                        className="font-bold text-lg select-none" 
                                        style={{color: level.color}}
                                        onClick={handleTitleTap}
                                    >
                                        Lv.{level.level} {level.name}
                                    </span>
                                    <span className="text-yellow-400 font-bold">{stats.totalXP} XP</span>
                                </div>
                                <div className="xp-bar-bg">
                                    <div 
                                        className="xp-bar-fill"
                                        style={{
                                            width: `${progress.progress}%`,
                                            background: `linear-gradient(90deg, ${level.color}, ${level.color}dd)`
                                        }}
                                    ></div>
                                </div>
                                <div className="text-xs text-slate-400 mt-1 text-right">
                                    {progress.isMax ? '🌟 LIVELLO MASSIMO!' : `${progress.current}/${progress.required} al prossimo livello`}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* STREAK BANNER */}
                    {stats.currentStreak > 0 && (
                        <div className="bg-gradient-to-r from-orange-600 to-red-600 rounded-xl p-3 flex items-center justify-center gap-3">
                            <span className="text-3xl streak-fire">🔥</span>
                            <div className="text-center">
                                <div className="text-2xl font-bold">{stats.currentStreak} GIORNI</div>
                                <div className="text-sm opacity-80">Serie consecutiva!</div>
                            </div>
                            <span className="text-3xl streak-fire">🔥</span>
                        </div>
                    )}

                    {/* TABS */}
                    <div className="flex gap-2 shrink-0 flex-wrap">
                        <button
                            onClick={() => setActiveTab('overview')}
                            className={`tab-btn flex-1 py-2 rounded-xl font-bold text-sm ${activeTab === 'overview' ? 'bg-blue-600 text-white active' : 'bg-slate-800 text-slate-400'}`}
                        >
                            📊 Panoramica
                        </button>
                        <button
                            onClick={() => setActiveTab('achievements')}
                            className={`tab-btn flex-1 py-2 rounded-xl font-bold text-sm ${activeTab === 'achievements' ? 'bg-yellow-600 text-white active' : 'bg-slate-800 text-slate-400'}`}
                        >
                            🏆 Trofei ({unlockedCount}/{achievements.length})
                        </button>
                        <button
                            onClick={() => setActiveTab('stats')}
                            className={`tab-btn flex-1 py-2 rounded-xl font-bold text-sm ${activeTab === 'stats' ? 'bg-green-600 text-white active' : 'bg-slate-800 text-slate-400'}`}
                        >
                            📈 Statistiche
                        </button>
                        <button
                            onClick={() => setActiveTab('wanted')}
                            className={`tab-btn flex-1 py-2 rounded-xl font-bold text-sm ${activeTab === 'wanted' ? 'bg-orange-600 text-white active' : 'bg-slate-800 text-slate-400'}`}
                            style={activeTab === 'wanted' ? {boxShadow:'0 0 15px rgba(234,88,12,0.5)'} : {}}
                        >
                            🏴‍☠️ Wanted
                        </button>
                    </div>

                    {/* PULSANTE INVIA REPORT */}
                    <button 
                        onClick={() => setShowReportMenu(true)}
                        className="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-xl font-bold active:scale-95 flex items-center justify-center gap-2 shrink-0"
                    >
                        📧 Invia Report ai Genitori
                    </button>

                    {/* CONTENT */}
                    <div className="scroll-area bg-slate-900 rounded-2xl p-4">
                        
                        {/* PANORAMICA */}
                        {activeTab === 'overview' && (
                            <div className="space-y-4">
                                {/* Quick Stats */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="stat-card border-2 border-blue-500">
                                        <div className="text-3xl mb-1">🧮</div>
                                        <div className="text-2xl font-bold text-blue-400">{stats.problemsSolved}</div>
                                        <div className="text-xs text-slate-400">Problemi risolti</div>
                                    </div>
                                    <div className="stat-card border-2 border-green-500">
                                        <div className="text-3xl mb-1">✍️</div>
                                        <div className="text-2xl font-bold text-green-400">{stats.textsChecked}</div>
                                        <div className="text-xs text-slate-400">Testi controllati</div>
                                    </div>
                                    <div className="stat-card border-2 border-purple-500">
                                        <div className="text-3xl mb-1">🗺️</div>
                                        <div className="text-2xl font-bold text-purple-400">{stats.mapsCreated}</div>
                                        <div className="text-xs text-slate-400">Mappe create</div>
                                    </div>
                                    <div className="stat-card border-2 border-yellow-500">
                                        <div className="text-3xl mb-1">💬</div>
                                        <div className="text-2xl font-bold text-yellow-400">{stats.tutorQuestions}</div>
                                        <div className="text-xs text-slate-400">Domande al tutor</div>
                                    </div>
                                </div>

                                {/* Recent Achievements */}
                                <div>
                                    <h3 className="text-lg font-bold text-yellow-400 mb-3">🏆 Ultimi Trofei Sbloccati</h3>
                                    <div className="space-y-2">
                                        {achievements.filter(a => a.unlocked).slice(-3).reverse().map(a => (
                                            <div key={a.id} className={`flex items-center gap-3 p-3 rounded-xl bg-slate-800 border-2 rarity-${a.rarity}`}>
                                                <span className="text-3xl">{a.icon}</span>
                                                <div className="flex-1">
                                                    <div className="font-bold">{a.name}</div>
                                                    <div className="text-xs text-slate-400">{a.desc}</div>
                                                </div>
                                                <div className="text-green-400 font-bold">+{a.xpReward} XP</div>
                                            </div>
                                        ))}
                                        {achievements.filter(a => a.unlocked).length === 0 && (
                                            <div className="text-center text-slate-500 py-6">
                                                <div className="text-4xl mb-2">🎯</div>
                                                <p>Completa attività per sbloccare trofei!</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Next Level Info */}
                                {!progress.isMax && (
                                    <div className="bg-slate-800 rounded-xl p-4 border-2 border-slate-600">
                                        <h3 className="text-lg font-bold mb-2">🎯 Prossimo Obiettivo</h3>
                                        <div className="flex items-center gap-3">
                                            <div className="text-4xl">
                                                {window.EduGamer?.LEVELS[level.level]?.icon || '⬆️'}
                                            </div>
                                            <div>
                                                <div className="font-bold">
                                                    Livello {level.level + 1}: {window.EduGamer?.LEVELS[level.level]?.name || 'Prossimo'}
                                                </div>
                                                <div className="text-sm text-slate-400">
                                                    Mancano {progress.required - progress.current} XP
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ACHIEVEMENTS */}
                        {activeTab === 'achievements' && (
                            <div className="space-y-3">
                                {['leggendario', 'epico', 'raro', 'comune'].map(rarity => {
                                    const rarityAchievements = achievements.filter(a => a.rarity === rarity);
                                    if (rarityAchievements.length === 0) return null;
                                    
                                    const rarityNames = {
                                        comune: '⚪ Comuni',
                                        raro: '🔵 Rari',
                                        epico: '🟣 Epici',
                                        leggendario: '🟡 Leggendari'
                                    };
                                    
                                    return (
                                        <div key={rarity}>
                                            <h3 className="text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">
                                                {rarityNames[rarity]}
                                            </h3>
                                            <div className="grid grid-cols-1 gap-2">
                                                {rarityAchievements.map(a => (
                                                    <div 
                                                        key={a.id} 
                                                        className={`achievement-card flex items-center gap-3 p-3 rounded-xl bg-slate-800 border-2 rarity-${a.rarity} ${!a.unlocked ? 'achievement-locked' : ''}`}
                                                    >
                                                        <span className="text-3xl">{a.unlocked ? a.icon : '🔒'}</span>
                                                        <div className="flex-1">
                                                            <div className="font-bold">{a.name}</div>
                                                            <div className="text-xs text-slate-400">{a.desc}</div>
                                                        </div>
                                                        <div className={`font-bold ${a.unlocked ? 'text-green-400' : 'text-slate-500'}`}>
                                                            {a.unlocked ? '✓' : `+${a.xpReward}`}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* STATISTICHE */}
                        {activeTab === 'stats' && (
                            <div className="space-y-4">
                                {/* Generali */}
                                <div>
                                    <h3 className="text-lg font-bold text-blue-400 mb-3">📊 Generali</h3>
                                    <div className="bg-slate-800 rounded-xl divide-y divide-slate-700">
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">XP Totali</span>
                                            <span className="font-bold text-yellow-400">{stats.totalXP}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">Livello</span>
                                            <span className="font-bold">{level.level} - {level.name}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">Attività completate</span>
                                            <span className="font-bold">{stats.totalActivities}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">Trofei sbloccati</span>
                                            <span className="font-bold">{unlockedCount}/{achievements.length}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Streak */}
                                <div>
                                    <h3 className="text-lg font-bold text-orange-400 mb-3">🔥 Streak</h3>
                                    <div className="bg-slate-800 rounded-xl divide-y divide-slate-700">
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">Serie attuale</span>
                                            <span className="font-bold text-orange-400">{stats.currentStreak} giorni</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">Record massimo</span>
                                            <span className="font-bold text-yellow-400">{stats.maxStreak} giorni</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Per Modulo */}
                                <div>
                                    <h3 className="text-lg font-bold text-green-400 mb-3">📚 Per Modulo</h3>
                                    <div className="bg-slate-800 rounded-xl divide-y divide-slate-700">
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">🧮 Operazioni matematiche</span>
                                            <span className="font-bold">{stats.mathOperations}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">📐 Problemi risolti</span>
                                            <span className="font-bold">{stats.problemsSolved}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">✍️ Testi controllati</span>
                                            <span className="font-bold">{stats.textsChecked}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">✅ Testi perfetti</span>
                                            <span className="font-bold text-green-400">{stats.perfectTexts}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">🗺️ Mappe create</span>
                                            <span className="font-bold">{stats.mapsCreated}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">💬 Domande al tutor</span>
                                            <span className="font-bold">{stats.tutorQuestions}</span>
                                        </div>
                                        <div className="flex justify-between p-3">
                                            <span className="text-slate-400">🎯 Quiz completati</span>
                                            <span className="font-bold">{stats.quizCompleted}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Badge Speciali */}
                                <div>
                                    <h3 className="text-lg font-bold text-purple-400 mb-3">✨ Badge Speciali</h3>
                                    <div className="flex gap-3 flex-wrap">
                                        {stats.nightOwl && (
                                            <div className="bg-slate-800 rounded-xl p-3 flex items-center gap-2 border-2 border-purple-500">
                                                <span className="text-2xl">🦉</span>
                                                <span className="font-bold">Gufo Notturno</span>
                                            </div>
                                        )}
                                        {stats.earlyBird && (
                                            <div className="bg-slate-800 rounded-xl p-3 flex items-center gap-2 border-2 border-yellow-500">
                                                <span className="text-2xl">🐦</span>
                                                <span className="font-bold">Mattiniero</span>
                                            </div>
                                        )}
                                        {!stats.nightOwl && !stats.earlyBird && (
                                            <div className="text-slate-500 text-sm">
                                                Studia in orari speciali per sbloccare badge!
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Data inizio */}
                                {stats.firstPlayDate && (
                                    <div className="text-center text-slate-500 text-sm pt-4 border-t border-slate-700">
                                        🎮 Giocatore dal {new Date(stats.firstPlayDate).toLocaleDateString('it-IT')}
                                    </div>
                                )}
                            </div>
                        )}
                        {/* WANTED POSTER */}
                        {activeTab === 'wanted' && (
                            <div className="space-y-4">
                                <div className="text-center">
                                    <div className="text-5xl mb-2">🏴‍☠️</div>
                                    <h3 className="text-xl font-bold text-orange-400">Il tuo Wanted Poster</h3>
                                    <p className="text-slate-400 text-sm mt-1">Livello {level.level} — {level.name} — Taglia: {(stats.totalXP * 1000000).toLocaleString('it-IT')} Berry</p>
                                </div>

                                <div className="bg-slate-800 rounded-xl p-4 space-y-3 border-2 border-orange-700">
                                    <label className="text-sm font-bold text-slate-300 block">Il tuo nome da pirata:</label>
                                    <input
                                        type="text"
                                        value={playerName}
                                        onChange={e => setPlayerName(e.target.value)}
                                        placeholder="Es: Luffy, Marco, Sofia..."
                                        maxLength={20}
                                        className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl p-3 text-white text-lg outline-none focus:border-orange-500 font-bold"
                                    />
                                    <button
                                        onClick={generateWantedPoster}
                                        disabled={!playerName.trim() || isGenerating || !localStorage.getItem('gemini_api_key')}
                                        className="w-full py-4 rounded-xl font-bold text-xl active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
                                        style={{background: 'linear-gradient(135deg, #ea580c, #fbbf24)', color: '#0a0e17'}}
                                    >
                                        {isGenerating ? '🎨 Generando il poster...' : '🏴‍☠️ GENERA WANTED POSTER!'}
                                    </button>
                                    {!localStorage.getItem('gemini_api_key') && (
                                        <p className="text-red-400 text-xs text-center">⚠️ Configura la chiave API nella Home</p>
                                    )}
                                </div>

                                {isGenerating && (
                                    <div className="flex flex-col items-center gap-3 py-8">
                                        <div className="text-6xl animate-bounce">⚓</div>
                                        <p className="text-orange-400 font-bold animate-pulse text-center">L'AI sta disegnando il tuo poster One Piece...</p>
                                        <p className="text-slate-500 text-sm">Può richiedere qualche secondo</p>
                                    </div>
                                )}

                                {posterError && (
                                    <div className="bg-red-900/50 border border-red-500 rounded-xl p-3 text-center text-red-300">
                                        ❌ {posterError}
                                    </div>
                                )}

                                {generatedPoster && !isGenerating && (
                                    <div className="space-y-3">
                                        <img
                                            src={`data:${generatedPoster.mime};base64,${generatedPoster.data}`}
                                            alt={`Wanted Poster di ${playerName}`}
                                            className="w-full rounded-2xl border-4 border-yellow-600"
                                            style={{boxShadow:'0 0 30px rgba(234,179,8,0.5)'}}
                                        />
                                        <div className="flex gap-3">
                                            <button onClick={downloadPoster} className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold active:scale-95 flex items-center justify-center gap-2 border-2 border-green-400">
                                                💾 Salva il Poster
                                            </button>
                                            <button onClick={generateWantedPoster} className="flex-1 bg-slate-700 text-white py-3 rounded-xl font-bold active:scale-95 border-2 border-slate-500">
                                                🔄 Rigenera
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>

                    {/* MODAL RESET */}
                    {showResetModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-sm border-2 border-red-500">
                                <div className="text-center mb-4">
                                    <div className="text-5xl mb-3">⚠️</div>
                                    <h3 className="text-xl font-bold text-red-400">Reset Progressi</h3>
                                </div>
                                
                                <p className="text-center text-slate-300 mb-6">
                                    Vuoi azzerare tutti i progressi?
                                </p>
                                
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setShowResetModal(false)}
                                        className="flex-1 bg-slate-600 text-white py-3 rounded-xl font-bold active:scale-95"
                                    >
                                        Annulla
                                    </button>
                                    <button 
                                        onClick={performReset}
                                        className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold active:scale-95"
                                    >
                                        Azzera
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL REPORT */}
                    {showReportMenu && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setShowReportMenu(false)}>
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-sm border-2 border-purple-500" onClick={e => e.stopPropagation()}>
                                <div className="text-center mb-4">
                                    <div className="text-5xl mb-3">📊</div>
                                    <h3 className="text-xl font-bold text-purple-400">Invia Report</h3>
                                </div>
                                
                                <p className="text-center text-slate-300 mb-6 text-sm">
                                    Scegli come inviare il report ai genitori
                                </p>
                                
                                <div className="flex flex-col gap-3">
                                    <button 
                                        onClick={shareReportWhatsApp}
                                        className="w-full bg-green-600 text-white py-3 rounded-xl font-bold active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        💬 WhatsApp
                                    </button>
                                    <button 
                                        onClick={shareReportEmail}
                                        className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        📧 Email
                                    </button>
                                    <button 
                                        onClick={saveReportFile}
                                        className="w-full bg-purple-600 text-white py-3 rounded-xl font-bold active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        💾 Salva File
                                    </button>
                                    <button 
                                        onClick={() => setShowReportMenu(false)}
                                        className="w-full bg-slate-600 text-white py-3 rounded-xl font-bold active:scale-95 mt-2"
                                    >
                                        ✕ Chiudi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
